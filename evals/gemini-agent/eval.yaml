kind: Eval
metadata:
  name: "gemini-agent-toolsets-eval"
config:
  agent:
    type: "file"
    path: "agent.yaml"
  mcpConfigFile: "../mcp-config.yaml"
  # llmJudge:
  #   ref:
  #     type: "builtin.llm-agent"
  #     model: "googleai:gemini-2.5-pro"
  taskSets:
    - glob: ../tasks/netedge/*/*.yaml
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
    # Observability tasks
    - glob: ../tasks/observability/*/*.yaml
      labelSelector:
        suite: observability
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    # Cluster diagnostics tasks
    - glob: ../tasks/cluster-diagnostics/*/*.yaml
      labelSelector:
        suite: cluster-diagnostics
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
