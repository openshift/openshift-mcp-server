kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "uninstall-helm-release"
  difficulty: medium
  labels:
    suite: helm
spec:
  requires:
    - extension: kubernetes

  setup:
    - kubernetes.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: helm-uninstall-test
    - kubernetes.helmInstall:
        chart: oci://registry-1.docker.io/bitnamicharts/nginx
        name: cleanup-test
        namespace: helm-uninstall-test

  verify:
    - kubernetes.helmList:
        namespace: helm-uninstall-test
    - llmJudge:
        contains: "cleanup-test"
        # Validates the agent's response mentions the uninstalled release name

  cleanup:
    - kubernetes.helmUninstall:
        name: cleanup-test
        namespace: helm-uninstall-test
    - kubernetes.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: helm-uninstall-test
        ignoreNotFound: true

  prompt:
    inline: Use Helm to uninstall the release named 'cleanup-test' from the 'helm-uninstall-test' namespace
