kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "list-helm-releases"
  difficulty: easy
  labels:
    suite: helm
spec:
  requires:
    - extension: kubernetes

  setup:
    - kubernetes.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: helm-list-test
    - kubernetes.helmInstall:
        chart: oci://ghcr.io/cloudpirates-io/helm-charts/nginx
        name: test-nginx
        namespace: helm-list-test

  verify:
    - kubernetes.helmList:
        namespace: helm-list-test
  cleanup:
    - kubernetes.helmUninstall:
        name: test-nginx
        namespace: helm-list-test
    - kubernetes.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: helm-list-test
        ignoreNotFound: true

  prompt:
    inline: List all Helm releases across all namespaces in the cluster
