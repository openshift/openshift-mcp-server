kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "install-helm-chart"
  difficulty: medium
  labels:
    suite: helm
spec:
  requires:
    - extension: kubernetes

  setup:
    - kubernetes.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: helm-install-test

  verify:
    - kubernetes.helmList:
        namespace: helm-install-test
  cleanup:
    - kubernetes.helmUninstall:
        name: my-redis
        namespace: helm-install-test
    - kubernetes.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: helm-install-test
        ignoreNotFound: true

  prompt:
    inline: Install the Helm chart oci://ghcr.io/cloudpirates-io/helm-charts/redis as a Helm release named 'my-redis' in the namespace 'helm-install-test'. Set replica to 1 using Helm values.
