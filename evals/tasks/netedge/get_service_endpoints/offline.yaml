kind: Task
metadata:
  name: get-service-endpoints-offline
  labels:
    suite: kubernetes
steps:
  verify:
    contains: "Addresses"
  prompt:
    inline: First load the must-gather archive located at 'evals/testdata/must-gather' using the mustgather_use tool. Then use the get_service_endpoints tool to list the endpoint slices for the router-default service in the openshift-ingress namespace. Report the backend pod addresses and node names from the offline result.
  assertions:
    toolsUsed:
      - server: kubernetes
        toolPattern: "mustgather_use"
      - server: kubernetes
        toolPattern: "get_service_endpoints"
        args:
          namespace: "openshift-ingress"
          service: "router-default"