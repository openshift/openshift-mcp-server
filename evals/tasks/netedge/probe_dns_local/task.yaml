kind: Task
metadata:
  name: probe-dns-local
steps:
  verify:
    contains: "NOERROR"
  prompt:
    inline: Run a DNS query from the MCP server for kubernetes.default.svc.cluster.local against the cluster DNS server at 172.30.0.10, record type A, and report the resolved addresses and response code.
  assertions:
    toolsUsed:
      - server: kubernetes
        toolPattern: "probe_dns_local"
        args:
          server: "172.30.0.10"
          name: "kubernetes.default.svc.cluster.local"
