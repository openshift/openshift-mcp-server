kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: netobserv
    requires: netobserv
  name: "Get flow byte metrics"
  category: "Metrics"
  description: "Queries aggregated byte metrics from NetObserv for a namespace."
  difficulty: easy
spec:
  requires:
    - extension: kubernetes
      as: k8s
  setup:
    - script:
        file: ../shared/setup-mock.sh
        timeout: 180s
  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -euo pipefail
          for _ in 1 2 3 4 5; do
            if REQUEST=$(curl -sf "http://127.0.0.1:9001/api/debug/last-request?endpoint=/api/flow/metrics"); then
              break
            fi
            sleep 1
          done
          : "${REQUEST:?mock unreachable}"
          echo "${REQUEST}" | grep -q '"namespace": "default"'
          echo "${REQUEST}" | grep -q '"type": "Bytes"'
          echo "${REQUEST}" | grep -q '"startTime"'
          echo "${REQUEST}" | grep -q '"endTime"'
          ! echo "${REQUEST}" | grep -q '"timeRange"'
    - llmJudge:
        contains: "success"
  prompt:
    inline: "How much byte throughput is the default namespace generating? Use NetObserv metrics for the last 5 minutes and summarize the response."
