kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: netobserv
    project: netobserv
    requires: netobserv
  annotations:
    project-name: "NetObserv"
    project-url: "https://netobserv.io"
  name: "List flows in default namespace"
  category: "Flow inspection"
  description: "Retrieves recent flow records for the default namespace."
  difficulty: easy
spec:
  requires:
    - extension: kubernetes
      as: k8s
  setup:
    - script:
        file: ../shared/setup-mock.sh
        timeout: 180s
  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -euo pipefail
          for _ in 1 2 3 4 5; do
            if REQUEST=$(curl -sf "http://127.0.0.1:9001/api/debug/last-request?endpoint=/api/loki/flow/records"); then
              break
            fi
            sleep 1
          done
          : "${REQUEST:?mock unreachable}"
          echo "${REQUEST}" | grep -q '"namespace": "default"'
          echo "${REQUEST}" | grep -q '"startTime"'
          echo "${REQUEST}" | grep -q '"endTime"'
          ! echo "${REQUEST}" | grep -q '"timeRange"'
    - llmJudge:
        contains: "eval-flow-1"
  prompt:
    inline: "A teammate asked what network traffic the default namespace has seen in the last 5 minutes. Use NetObserv to investigate and summarize the flows you find, including any flow names or counts."
