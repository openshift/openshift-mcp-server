kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: netobserv
    project: netobserv
    requires: netobserv
  annotations:
    project-name: "NetObserv"
    project-url: "https://netobserv.io"
  name: "TLS version breakdown"
  category: "Security analysis"
  description: "Investigates TLS version usage for a namespace using flow metrics."
  difficulty: medium
spec:
  requires:
    - extension: kubernetes
      as: k8s
  setup:
    - script:
        file: ../shared/setup-mock.sh
        timeout: 180s
  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -euo pipefail
          for _ in 1 2 3 4 5; do
            if REQUEST=$(curl -sf "http://127.0.0.1:9001/api/debug/last-request?endpoint=/api/flow/metrics"); then
              break
            fi
            sleep 1
          done
          : "${REQUEST:?mock unreachable}"
          echo "${REQUEST}" | grep -q '"namespace": "default"'
          echo "${REQUEST}" | grep -q '"aggregateBy": "TLSVersion"'
          echo "${REQUEST}" | grep -q '"startTime"'
          echo "${REQUEST}" | grep -q '"endTime"'
          ! echo "${REQUEST}" | grep -q '"timeRange"'
    - llmJudge:
        contains: "TLS 1.3"
  prompt:
    inline: "I'm reviewing security posture for workloads in the default namespace. Show me how TLS traffic breaks down by TLS version over the last 5 minutes and summarize which versions are in use."
