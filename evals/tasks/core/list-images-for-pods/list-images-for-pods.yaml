kind: Task
metadata:
  labels:
    suite: core
    project: kubernetes
  annotations:
    project-name: "Kubernetes"
    project-url: "https://kubernetes.io"
  name: list-images-for-pods
  difficulty: medium
steps:
  setup:
    file: setup.sh
  verify:
    contains: "quay.io/fedora/mysql-80:latest"
  cleanup:
    file: cleanup.sh
  prompt:
    inline: "What images are all pods running in the cluster?"
