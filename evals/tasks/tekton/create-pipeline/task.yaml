kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "create-tekton-pipeline"
  difficulty: easy
  labels:
    suite: tekton
    requires: tekton
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true
    - script:
        inline: |-
          #!/usr/bin/env bash
          source ../helpers/cleanup-namespace.sh
          cleanup_tekton_namespace
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          if ! kubectl get pipeline greet-pipeline -n tekton-eval > /dev/null 2>&1; then
            echo "ERROR: Pipeline greet-pipeline not found in tekton-eval"
            exit 1
          fi
          TASK_REF=$(kubectl get pipeline greet-pipeline -n tekton-eval -o jsonpath='{.spec.tasks[0].taskRef.name}')
          if [ "$TASK_REF" != "greet-task" ]; then
            echo "ERROR: expected taskRef greet-task, got $TASK_REF"
            exit 1
          fi
          echo "Pipeline greet-pipeline created successfully with correct taskRef"
    - llmJudge:
        contains: "greet-pipeline"

  cleanup:
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Pipeline
        metadata:
          name: greet-pipeline
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true

  prompt:
    inline: |-
      Create a Tekton Pipeline named "greet-pipeline" in the tekton-eval namespace.
      The pipeline should have a single task step named "greet" that references a Task named "greet-task".
