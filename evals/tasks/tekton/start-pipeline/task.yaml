kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "start-tekton-pipeline"
  difficulty: medium
  labels:
    suite: tekton
    requires: tekton
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true
    - script:
        inline: |-
          #!/usr/bin/env bash
          source ../helpers/cleanup-namespace.sh
          cleanup_tekton_namespace
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: echo-task
          namespace: tekton-eval
        spec:
          steps:
            - name: echo
              image: alpine
              command: ["echo", "hello"]
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Pipeline
        metadata:
          name: hello-pipeline
          namespace: tekton-eval
        spec:
          tasks:
            - name: echo
              taskRef:
                name: echo-task

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          COUNT=$(kubectl get pipelinerun -n tekton-eval \
            -o jsonpath='{range .items[?(@.spec.pipelineRef.name=="hello-pipeline")]}{.metadata.name}{"\n"}{end}' \
            2>/dev/null | grep -c . || echo "0")
          if [ "$COUNT" -lt "1" ]; then
            echo "ERROR: No PipelineRun found referencing hello-pipeline"
            exit 1
          fi
          echo "PipelineRun for hello-pipeline found ($COUNT total)"

  cleanup:
    - script:
        inline: |-
          #!/usr/bin/env bash
          kubectl delete pipelinerun --all -n tekton-eval --ignore-not-found=true 2>/dev/null || true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Pipeline
        metadata:
          name: hello-pipeline
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: echo-task
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true

  prompt:
    inline: Start the Tekton Pipeline named hello-pipeline in the tekton-eval namespace.
