kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "start-tekton-task"
  difficulty: medium
  labels:
    suite: tekton
    requires: tekton
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true
    - script:
        inline: |-
          #!/usr/bin/env bash
          source ../helpers/cleanup-namespace.sh
          cleanup_tekton_namespace
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: echo-task
          namespace: tekton-eval
        spec:
          steps:
            - name: echo
              image: alpine
              command: ["echo", "Hello, Tekton!"]

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          COUNT=$(kubectl get taskrun -n tekton-eval \
            -o jsonpath='{range .items[?(@.spec.taskRef.name=="echo-task")]}{.metadata.name}{"\n"}{end}' \
            2>/dev/null | grep -c . || echo "0")
          if [ "$COUNT" -lt "1" ]; then
            echo "ERROR: No TaskRun found referencing echo-task"
            exit 1
          fi
          echo "TaskRun for echo-task found ($COUNT total)"

  cleanup:
    - script:
        inline: |-
          #!/usr/bin/env bash
          kubectl delete taskrun --all -n tekton-eval --ignore-not-found=true 2>/dev/null || true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: echo-task
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true

  prompt:
    inline: Start the Tekton Task named echo-task in the tekton-eval namespace.
