kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "restart-tekton-pipelinerun"
  difficulty: medium
  labels:
    suite: tekton
    requires: tekton
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true
    - script:
        inline: |-
          #!/usr/bin/env bash
          source ../helpers/cleanup-namespace.sh
          cleanup_tekton_namespace
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: noop-task
          namespace: tekton-eval
        spec:
          steps:
            - name: noop
              image: alpine
              command: ["echo", "noop"]
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Pipeline
        metadata:
          name: hello-pipeline
          namespace: tekton-eval
        spec:
          tasks:
            - name: noop
              taskRef:
                name: noop-task
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: PipelineRun
        metadata:
          name: test-run
          namespace: tekton-eval
        spec:
          pipelineRef:
            name: hello-pipeline

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          # After restart a new PipelineRun should have been created (total >= 2)
          COUNT=$(kubectl get pipelinerun -n tekton-eval --no-headers 2>/dev/null | wc -l)
          if [ "$COUNT" -lt "2" ]; then
            echo "ERROR: Expected at least 2 PipelineRuns after restart, found $COUNT"
            exit 1
          fi
          echo "Restart created a new PipelineRun ($COUNT total in namespace)"
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          # Verify that every new PipelineRun (excluding the original) references the correct pipeline
          NEW_RUNS=$(kubectl get pipelinerun -n tekton-eval -o jsonpath='{range .items[?(@.metadata.name!="test-run")]}{.metadata.name}{"\t"}{.spec.pipelineRef.name}{"\n"}{end}')
          if [ -z "$NEW_RUNS" ]; then
            echo "ERROR: No new PipelineRun found (only the original test-run exists)"
            exit 1
          fi
          while IFS=$'\t' read -r name pipeline; do
            if [ "$pipeline" != "hello-pipeline" ]; then
              echo "ERROR: PipelineRun '$name' references pipeline '$pipeline' instead of 'hello-pipeline'"
              exit 1
            fi
            echo "PipelineRun '$name' correctly references pipeline 'hello-pipeline'"
          done <<< "$NEW_RUNS"

  cleanup:
    - script:
        inline: |-
          #!/usr/bin/env bash
          kubectl delete pipelinerun --all -n tekton-eval --ignore-not-found=true 2>/dev/null || true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Pipeline
        metadata:
          name: hello-pipeline
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: noop-task
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true

  prompt:
    inline: Restart the Tekton PipelineRun named test-run in the tekton-eval namespace.
