kind: Task
metadata:
  labels:
    suite: kiali
  name: "mesh-status"
  difficulty: easy
steps:
  setup: 
    inline: |-
      #!/usr/bin/env bash
      set -euo pipefail
      kubectl config set-context --current --namespace=bookinfo
      kubectl set image deployment/ratings-v1 ratings=examples/ratings-v1:broken-tag
      kubectl scale deployment/ratings-v1 --replicas=5
      sleep 10
  verify:
    contains: "degraded"
  cleanup: 
    inline: |-
      #!/usr/bin/env bash
      set -euo pipefail
      NS="bookinfo"
      kubectl rollout undo deployment/ratings-v1 -n "$NS"
      sleep 10         
  prompt:
    inline: Check my mesh.