apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-deployment
  namespace: webshop-frontend
  labels:
    app: web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      nodeSelector:
        environment: production-gpu
      containers:
      - name: web-app-container
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command: ["/bin/sh", "-c", "sleep infinity"]
        ports:
        - containerPort: 80
