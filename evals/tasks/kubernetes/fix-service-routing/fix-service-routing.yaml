kind: Task
metadata:
  labels:
    suite: kubernetes
  name: fix-service-routing
  difficulty: medium
steps:
  setup:
    file: setup.sh
  verify:
    file: verify.sh
  cleanup:
    file: cleanup.sh
  prompt:
    inline: "Diagnose and fully fix why Service 'http' in namespace 'web' has no working backends. Execute all required Kubernetes write changes now in this session (do not ask for confirmation, do not provide options, do not stop at analysis). REQUIREMENTS: 1) Repair Service-to-Pod routing so the Service selector and targetPort match the Deployment template (label app=http, container name main, container port 80). 2) Do not break the workload: it must stay Running/Ready under OpenShift restricted SCC (the cluster already uses registry.access.redhat.com/ubi9/ubi-minimal:latest with a long-running command, not an HTTP server process). 3) Leave the namespace so the Service has ready backends (EndpointSlice addresses for service http). IMPORTANT: Do not respond with questions like 'Would you like me to proceed?'; proceed and complete the fix."
