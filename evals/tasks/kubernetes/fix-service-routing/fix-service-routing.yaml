kind: Task
metadata:
  labels:
    suite: kubernetes
  name: fix-service-routing
  difficulty: medium
steps:
  setup:
    file: setup.sh
  verify:
    file: verify.sh
  cleanup:
    file: cleanup.sh
  prompt:
    inline: "Diagnose and fully fix why Service 'nginx' in namespace 'web' is inaccessible. Execute all required Kubernetes write changes now in this session (do not ask for confirmation, do not provide options, do not stop at analysis). REQUIREMENTS: 1) Repair Service-to-Pod routing so selector and targetPort match the actual nginx workload. 2) Ensure the backend pod is Running/Ready under OpenShift restricted constraints (if needed, replace with a non-root compatible nginx image and correct container port). 3) Leave the namespace in a verifiable working state where the Service has ready endpoints and in-cluster HTTP access to 'nginx' succeeds. IMPORTANT: Do not respond with questions like 'Would you like me to proceed?'; proceed and complete the fix."
