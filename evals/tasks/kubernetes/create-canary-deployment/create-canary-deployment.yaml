kind: Task
metadata:
  labels:
    suite: kubernetes
  name: create-canary-deployment
  difficulty: hard
steps:
  setup:
    file: setup.sh
  verify:
    file: verify.sh
  cleanup:
    file: cleanup.sh
  prompt:
    inline: "We want to test a new version of our recommendation engine (nginxinc/nginx-unprivileged:1.29) in production without disturbing the existing stable deployment. Deploy it as a canary named engine-v2-1 and route about 50% traffic to it. Use a restricted-v2 compatible securityContext and expose the canary container on port 8080. The current stable deployment is engine-v2-0 in namespace canary-deployment-ns. REQUIREMENTS: 1) Canary must use label version=v2.1 (do NOT use version=v2.0 on canary pods). 2) You must patch Service recommendation-engine selector to remove the version key so selector becomes only app=recommendation-engine. Do not keep or reintroduce spec.selector.version. IMPORTANT: execute the changes now by calling Kubernetes MCP write tools in this session. Do not only provide YAML, plans, or kubectl commands."
