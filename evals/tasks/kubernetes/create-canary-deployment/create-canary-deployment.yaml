kind: Task
metadata:
  labels:
    suite: kubernetes
  name: create-canary-deployment
  difficulty: hard
steps:
  setup:
    file: setup.sh
  verify:
    file: verify.sh
  cleanup:
    file: cleanup.sh
  prompt:
    inline: "We want to test a new version of our recommendation engine (quay.io/nginx/nginx-unprivileged:1.29) in production without disturbing the existing stable deployment. Deploy it as a canary named engine-v2-1 with 2 replicas, matching the same container port and security configuration as the stable deployment. Route about 50% of the traffic to the canary by updating the service to target both deployments. The current stable deployment is engine-v2-0 in namespace canary-deployment-ns."
