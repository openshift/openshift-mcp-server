kind: Task
metadata:
  labels:
    suite: kubernetes
  name: rolling-update-deployment
  difficulty: medium
steps:
  setup:
    file: setup.sh
  verify:
    file: verify.sh
  cleanup:
    file: cleanup.sh
  prompt:
    inline: "Update deployment 'web-app' in namespace 'rollout-test' to image 'registry.access.redhat.com/ubi9/ubi-minimal:latest'. Keep the container command as sleep infinity so pods stay Running. Apply the change now and complete a rolling update with minimal disruption."
