kind: Eval
metadata:
  name: "core-e2e"
config:
  agent:
    type: "file"
    path: agent.yaml
  mcpConfigFile: ../../mcp-config.yaml
  extensions:
    kubernetes:
      package: https://github.com/mcpchecker/kubernetes-extension@v0.0.3
  llmJudge:
    ref:
      type: builtin.llm-agent
      model: "anthropic:claude-sonnet-4-6"
  taskSets:
    - glob: ../../tasks/*/*/*.yaml
      labelSelector:
        suite: core
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
