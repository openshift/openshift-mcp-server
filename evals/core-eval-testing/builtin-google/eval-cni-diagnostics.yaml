kind: Eval
metadata:
  name: "cni-diagnostics-e2e"
config:
  agent:
    type: "file"
    path: agent.yaml
  mcpConfigFile: ../../mcp-config.yaml
  extensions:
    kubernetes:
      package: https://github.com/mcpchecker/kubernetes-extension@v0.0.4
  llmJudge:
    ref:
      type: file
      path: agent.yaml
  taskSets:
    - glob: ../../tasks/*/*/*.yaml
      labelSelector:
        suite: cni-diagnostics
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
