kind: Eval
metadata:
  name: "helm-e2e"
config:
  agent:
    type: "file"
    path: agent.yaml
  mcpConfigFile: ../../mcp-config.yaml
  extensions:
    kubernetes:
      package: https://github.com/mcpchecker/kubernetes-extension@v0.0.3
  llmJudge:
    env:
      baseUrlKey: JUDGE_BASE_URL
      apiKeyKey: JUDGE_API_KEY
      modelNameKey: JUDGE_MODEL_NAME
  taskSets:
    - glob: ../../tasks/*/*/*.yaml
      labelSelector:
        suite: helm
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 10
