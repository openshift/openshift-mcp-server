kind: Eval
metadata:
  name: "netobserv-e2e"
config:
  agent:
    type: "file"
    path: agent.yaml
  mcpConfigFile: ../../mcp-config.yaml
  extensions:
    kubernetes:
      package: https://github.com/mcpchecker/kubernetes-extension@v0.0.4
  llmJudge:
    ref:
      type: file
      path: agent.yaml
  taskSets:
    - glob: ../../tasks/*/*/*.yaml
      labelSelector:
        suite: core
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    - glob: ../../tasks/*/*/*.yaml
      labelSelector:
        suite: config
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: "configuration_.*"
        minToolCalls: 1
        maxToolCalls: 10
    - glob: ../../tasks/*/*/*.yaml
      labelSelector:
        suite: netobserv
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: "netobserv_.*"
        minToolCalls: 1
        maxToolCalls: 10
