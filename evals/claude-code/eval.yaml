kind: Eval
metadata:
  name: "kubernetes-basic-operations"
config:
  agent:
    type: "file"
    path: agent.yaml
  mcpConfigFile: ../mcp-config.yaml
  extensions:
    kubernetes:
      package: https://github.com/mcpchecker/kubernetes-extension@v0.0.4
  # The claude-code agent judges with claude-code too, so the whole flow (agent +
  # judge) runs on one Anthropic/Claude-subscription auth with no OpenAI key.
  # (The openai-agent config keeps an independent openai:gpt-5 judge for CI.)
  llmJudge:
    ref:
      type: builtin.claude-code
  taskSets:
    # Kubernetes tasks
    - glob: ../tasks/*/*/*.yaml
      labelSelector:
        suite: core
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    - glob: ../tasks/config/*/*.yaml
      labelSelector:
        suite: config
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: "configuration_.*"
        minToolCalls: 1
        maxToolCalls: 10
    - glob: ../tasks/helm/*/*.yaml
      labelSelector:
        suite: helm
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: "helm_.*"
        minToolCalls: 1
        maxToolCalls: 10
    # KubeVirt tasks
    - glob: ../tasks/kubevirt/*/*.yaml
      labelSelector:
        suite: kubevirt
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    # Kiali tasks
    - glob: ../tasks/kiali/*/*.yaml
      labelSelector:
        suite: kiali
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    # Tekton tasks
    - glob: ../tasks/tekton/*/*.yaml
      labelSelector:
        suite: tekton
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: ".*"
        minToolCalls: 1
        maxToolCalls: 20
    # NetObserv tasks
    - glob: ../tasks/netobserv/*/*.yaml
      labelSelector:
        suite: netobserv
      assertions:
        toolsUsed:
          - server: kubernetes
            toolPattern: "netobserv_.*"
        minToolCalls: 1
        maxToolCalls: 10
