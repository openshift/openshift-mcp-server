name: mcpchecker MCP Evaluation

on:
  # Weekly schedule - runs every Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Manual trigger via PR comments
  issue_comment:
    types: [created]

  # Allow manual workflow dispatch for testing
  workflow_dispatch:
    inputs:
      suite:
        description: 'Which task suite to run (core, helm, kubevirt, kiali, tekton, or all)'
        required: false
        default: 'core'
        type: choice
        options:
          - core
          - helm
          - kubevirt
          - kiali
          - tekton
          - all
      task-filter:
        description: 'Regular expression to filter tasks (optional)'
        required: false
        default: ''
      verbose:
        description: 'Enable verbose output'
        required: false
        type: boolean
        default: false

# Minimal permissions - no write access to PRs/issues
# This workflow checks out and runs potentially untrusted PR code
permissions:
  contents: read
  actions: read

concurrency:
  # Only run once for latest commit per ref and cancel other (previous) runs.
  # For issue_comment events, use PR number as group to avoid different PRs canceling each other.
  group: ${{ github.workflow }}-${{ github.event_name == 'issue_comment' && format('pr-{0}', github.event.issue.number) || github.ref }}
  cancel-in-progress: true

env:
  KIND_CLUSTER_NAME: mcp-eval-cluster

defaults:
  run:
    shell: bash

jobs:
  # Check if workflow should run based on trigger
  check-trigger:
    name: Check if evaluation should run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      # Needed to comment on the PR when the TOCTOU check fails
      pull-requests: write
    # Never run on forks: the evaluation needs model/judge secrets that forks
    # don't have, so it would only ever fail there.
    if: |
      github.repository == 'containers/kubernetes-mcp-server' &&
      (github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/run-mcpchecker')))
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
      toolsets: ${{ steps.suite.outputs.toolsets }}
      label-selector: ${{ steps.suite.outputs.label-selector }}
      pr-number: ${{ steps.check.outputs.pr-number }}
      pr-sha: ${{ steps.check.outputs.pr-sha }}
      is-pr: ${{ steps.check.outputs.is-pr }}
    steps:
      - name: Check trigger conditions
        id: check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const { owner, repo } = context.repo;

            if (context.eventName === 'issue_comment') {
              const commenter = context.payload.comment.user.login;
              const prNum = context.payload.issue.number;
              const commentId = context.payload.comment.id;

              // Only repository collaborators with admin/write access may trigger a run.
              const { data: permData } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: commenter,
              });
              if (permData.permission !== 'admin' && permData.permission !== 'write') {
                core.setOutput('should-run', 'false');
                core.setOutput('is-pr', 'true');
                core.setOutput('pr-number', String(prNum));
                core.setOutput('pr-sha', '');
                core.info(`User ${commenter} does not have permission to trigger evaluations`);
                return;
              }

              // TOCTOU guard: walk the PR timeline and extract the SHA of the
              // last commit *before* the /run-mcpchecker comment.  This is the
              // exact code the maintainer reviewed.  If any commits or force-pushes
              // landed after the comment, the run is rejected.  Timeline ordering
              // is controlled by GitHub's servers and cannot be spoofed.
              const timeline = await github.paginate(
                github.rest.issues.listEventsForTimeline,
                { owner, repo, issue_number: prNum, per_page: 100 },
              );

              let seenComment = false;
              let lastCommitSha = null;
              for (const event of timeline) {
                if (event.event === 'committed') {
                  if (!seenComment) {
                    lastCommitSha = event.sha;
                  } else {
                    core.setOutput('should-run', 'false');
                    core.setOutput('is-pr', 'true');
                    core.setOutput('pr-number', String(prNum));
                    core.setOutput('pr-sha', '');
                    core.info('TOCTOU: PR was updated after the /run-mcpchecker comment');
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: prNum,
                      body: '**Evaluation not started:** the PR was updated after this ' +
                            '`/run-mcpchecker` comment was posted. Please re-review and ' +
                            'comment `/run-mcpchecker` again.',
                    });
                    return;
                  }
                } else if (event.event === 'head_ref_force_pushed') {
                  if (seenComment) {
                    core.setOutput('should-run', 'false');
                    core.setOutput('is-pr', 'true');
                    core.setOutput('pr-number', String(prNum));
                    core.setOutput('pr-sha', '');
                    core.info('TOCTOU: PR was force-pushed after the /run-mcpchecker comment');
                    await github.rest.issues.createComment({
                      owner, repo, issue_number: prNum,
                      body: '**Evaluation not started:** the PR was force-pushed after this ' +
                            '`/run-mcpchecker` comment was posted. Please re-review and ' +
                            'comment `/run-mcpchecker` again.',
                    });
                    return;
                  }
                  // After a force-push the old commit SHAs are invalid; reset
                  // and let subsequent committed events repopulate.
                  lastCommitSha = null;
                } else if (event.event === 'commented' && event.id === commentId) {
                  seenComment = true;
                }
              }

              if (!seenComment) {
                core.setOutput('should-run', 'false');
                return
              }

              if (!lastCommitSha) {
                core.setOutput('should-run', 'false');
                core.setOutput('is-pr', 'true');
                core.setOutput('pr-number', String(prNum));
                core.setOutput('pr-sha', '');
                core.warning('Could not determine the PR head SHA from the timeline');
                return;
              }

              core.setOutput('should-run', 'true');
              core.setOutput('is-pr', 'true');
              core.setOutput('pr-number', String(prNum));
              core.setOutput('pr-sha', lastCommitSha);
              core.info(`Pinned to SHA: ${lastCommitSha}`);
            } else {
              core.setOutput('should-run', 'true');
              core.setOutput('is-pr', 'false');
              core.setOutput('pr-sha', context.sha);
            }

      - name: Select suite
        id: suite
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          INPUT_SUITE: ${{ github.event.inputs.suite }}
        run: |
          # Suite selection: defaults to 'core', can be overridden by workflow_dispatch input or PR comment
          SUITE="${INPUT_SUITE:-core}"

          if [[ "$EVENT_NAME" == "issue_comment" ]]; then
            # Parse /run-mcpchecker [suite] from PR comment
            BODY="${COMMENT_BODY//[[:space:]]/ }"
            read -r _ FIRST_WORD _ <<< "$BODY"
            case "${FIRST_WORD,,}" in
              core|helm|kubevirt|kiali|tekton|all)
                SUITE="${FIRST_WORD,,}"
                ;;
            esac
          fi

          # Select label-selector and infrastructure based on suite
          # All suites use the same eval.yaml file; suite controls label-selector + infra.
          case "$SUITE" in
            helm)
              echo "label-selector=suite=helm" >> "$GITHUB_OUTPUT"
              echo "toolsets=core,config,helm" >> "$GITHUB_OUTPUT"
              ;;
            kubevirt)
              echo "label-selector=suite=kubevirt" >> "$GITHUB_OUTPUT"
              echo "toolsets=core,config,kubevirt,tekton" >> "$GITHUB_OUTPUT"
              ;;
            kiali)
              echo "label-selector=suite=kiali" >> "$GITHUB_OUTPUT"
              echo "toolsets=core,config,kiali" >> "$GITHUB_OUTPUT"
              ;;
            tekton)
              echo "label-selector=suite=tekton" >> "$GITHUB_OUTPUT"
              echo "toolsets=core,tekton" >> "$GITHUB_OUTPUT"
              ;;
            all)
              echo "label-selector=" >> "$GITHUB_OUTPUT"  # No filter: run all taskSets
              echo "toolsets=core,config,helm,kiali,kubevirt,tekton" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # Default to core suite (matches 'core' or any unrecognized suite)
              echo "label-selector=suite=core" >> "$GITHUB_OUTPUT"
              echo "toolsets=core,config" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # Run mcpchecker evaluation with Kind cluster
  run-evaluation:
    name: Run MCP Evaluation
    needs: check-trigger
    if: needs.check-trigger.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          # Use pinned SHA to prevent TOCTOU attacks
          # For PRs: the SHA captured when maintainer commented
          # For other triggers: the current commit SHA
          ref: ${{ needs.check-trigger.outputs.pr-sha }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Setup Kind cluster
        run: make kind-create-cluster KIND_CLUSTER_NAME="$KIND_CLUSTER_NAME"

      # Only the core suite needs a resize-capable StorageClass (for resize-pvc).
      # Runs for suite=core and for the "all" run (empty label-selector).
      - name: Install CSI hostPath driver (resize-capable StorageClass)
        if: needs.check-trigger.outputs.label-selector == 'suite=core' || needs.check-trigger.outputs.label-selector == ''
        run: make csi-hostpath-install

      - name: Install Istio/Kiali and bookinfo demo
        if: contains(needs.check-trigger.outputs.toolsets, 'kiali')
        run: make setup-kiali

      - name: Install KubeVirt
        if: contains(needs.check-trigger.outputs.toolsets, 'kubevirt')
        run: make kubevirt-install

      - name: Install Tekton
        if: contains(needs.check-trigger.outputs.toolsets, 'tekton')
        run: make tekton-install

      - name: Start MCP server
        run: make run-server
        env:
          TOOLSETS: ${{ needs.check-trigger.outputs.toolsets }}
          MCP_CONFIG_DIR: 'dev/config/mcp-configs'

      - name: Run mcpchecker evaluation
        id: mcpchecker
        uses: mcpchecker/mcpchecker/.github/actions/mcpchecker-action@v0.0.18
        with:
          eval-config: 'evals/openai-agent/eval.yaml'
          mcpchecker-version: 'latest'
          label-selector: ${{ needs.check-trigger.outputs.label-selector }}
          task-filter: ${{ github.event.inputs.task-filter || '' }}
          output-format: 'json'
          verbose: ${{ github.event.inputs.verbose || 'false' }}
          upload-artifacts: 'true'
          artifact-name: 'mcpchecker-results'
          fail-on-error: 'false'
          task-pass-threshold: '0.8'
          assertion-pass-threshold: '0.8'
          working-directory: '.'
        env:
          # OpenAI Agent configuration
          MODEL_BASE_URL: ${{ secrets.MODEL_BASE_URL }}
          MODEL_KEY: ${{ secrets.MODEL_KEY }}
          # LLM Judge configuration
          JUDGE_BASE_URL: ${{ secrets.JUDGE_BASE_URL }}
          JUDGE_API_KEY: ${{ secrets.JUDGE_API_KEY }}
          JUDGE_MODEL_NAME: ${{ secrets.JUDGE_MODEL_NAME }}

      - name: Cleanup
        if: always()
        run: |
          make stop-server || true
          make kind-delete-cluster KIND_CLUSTER_NAME="$KIND_CLUSTER_NAME" || true

      # Compare PR results against baseline from main branch
      - name: Fetch baseline results from main
        if: needs.check-trigger.outputs.is-pr == 'true'
        env:
          EVAL_CONFIG: 'evals/openai-agent/eval.yaml'
        run: |
          # Derive agent name from eval-config path (same logic as commit-results job)
          AGENT_NAME=$(echo "$EVAL_CONFIG" | sed 's|evals/||; s|/eval\.yaml||')
          git fetch origin main --depth=1
          git show "origin/main:evals/results/${AGENT_NAME}-latest.json" > /tmp/baseline-results.json 2>/dev/null || true

      - name: Check diff prerequisites
        id: diff-check
        if: needs.check-trigger.outputs.is-pr == 'true'
        run: |
          RESULTS_FILE=$(ls -t mcpchecker-*-out.json 2>/dev/null | head -1)
          if [ -z "$RESULTS_FILE" ]; then
            echo "No mcpchecker results file found, skipping diff"
            echo "has-diff=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ ! -s /tmp/baseline-results.json ]; then
            echo "No baseline results found on main branch, skipping diff"
            echo "has-diff=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has-diff=true" >> $GITHUB_OUTPUT
          echo "results-file=$RESULTS_FILE" >> $GITHUB_OUTPUT

      - name: Run mcpchecker diff
        id: mcpchecker-diff
        if: needs.check-trigger.outputs.is-pr == 'true' && steps.diff-check.outputs.has-diff == 'true'
        uses: mcpchecker/mcpchecker/.github/actions/mcpchecker-diff-action@v0.0.18
        with:
          base-results: /tmp/baseline-results.json
          current-results: ${{ steps.diff-check.outputs.results-file }}
          mcpchecker-version: 'latest'

      # Save context and results for the reporting workflow
      - name: Save evaluation context
        if: always() && needs.check-trigger.outputs.is-pr == 'true'
        env:
          DIFF_OUTPUT: ${{ steps.mcpchecker-diff.outputs.diff-output }}
          PR_NUMBER: ${{ needs.check-trigger.outputs.pr-number }}
          PR_SHA: ${{ needs.check-trigger.outputs.pr-sha }}
          TASKS_PASSED: ${{ steps.mcpchecker.outputs.tasks-passed }}
          TASKS_TOTAL: ${{ steps.mcpchecker.outputs.tasks-total }}
          TASK_PASS_RATE: ${{ steps.mcpchecker.outputs.task-pass-rate }}
          ASSERTIONS_PASSED: ${{ steps.mcpchecker.outputs.assertions-passed }}
          ASSERTIONS_TOTAL: ${{ steps.mcpchecker.outputs.assertions-total }}
          PASSED: ${{ steps.mcpchecker.outputs.passed }}
          HAS_DIFF: ${{ steps.diff-check.outputs.has-diff || 'false' }}
        run: |
          mkdir -p eval-context
          cat > eval-context/context.json << EOF
          {
            "pr_number": "${PR_NUMBER}",
            "pr_sha": "${PR_SHA}",
            "tasks_passed": "${TASKS_PASSED}",
            "tasks_total": "${TASKS_TOTAL}",
            "task_pass_rate": "${TASK_PASS_RATE}",
            "assertions_passed": "${ASSERTIONS_PASSED}",
            "assertions_total": "${ASSERTIONS_TOTAL}",
            "passed": "${PASSED}",
            "has_diff": "${HAS_DIFF}"
          }
          EOF
          if [ -n "$DIFF_OUTPUT" ]; then
            echo "$DIFF_OUTPUT" > eval-context/diff-output.txt
          fi

      - name: Upload PR context
        if: always() && needs.check-trigger.outputs.is-pr == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: eval-context
          path: eval-context/
          retention-days: 1

  # Create PR with results (scheduled runs only)
  commit-results:
    name: Commit Evaluation Results
    needs: [check-trigger, run-evaluation]
    # Only commit results on scheduled runs, not manual dispatch or PR comments
    if: always() && github.event_name == 'schedule' && needs.run-evaluation.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: main

      - name: Download mcpchecker results
        uses: actions/download-artifact@v8
        with:
          name: mcpchecker-results
          path: mcpchecker-results/

      - name: Copy results to evals/results
        env:
          EVAL_CONFIG: 'evals/openai-agent/eval.yaml'
        run: |
          # Extract agent name from eval-config path
          AGENT_NAME=$(echo "$EVAL_CONFIG" | sed 's|evals/||; s|/eval\.yaml||')

          mkdir -p evals/results
          # Copy the most recent mcpchecker results file with agent-specific name
          RESULTS_FILE=$(ls -t mcpchecker-results/mcpchecker-*-out.json 2>/dev/null | head -1)
          if [ -z "$RESULTS_FILE" ]; then
            echo "Error: No mcpchecker results file found"
            exit 1
          fi
          cp "$RESULTS_FILE" "evals/results/${AGENT_NAME}-latest.json"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIGGER: ${{ github.event_name }}
          COMMIT_SHA: ${{ needs.check-trigger.outputs.pr-sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BRANCH="chore/update-eval-results"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or reset the branch
          git checkout -B "$BRANCH"
          git add evals/results/*-latest.json

          # Skip if no changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(evals): update mcpchecker evaluation results"
          git push -f origin "$BRANCH"

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' || echo "")

          PR_BODY=$(cat <<EOF
          ## Automated Evaluation Results Update

          This PR updates the mcpchecker evaluation results from the weekly scheduled run.

          **Run details:**
          - Trigger: $TRIGGER
          - Commit: $COMMIT_SHA
          - Workflow run: $RUN_URL

          ---
          This PR was automatically generated by the mcpchecker workflow.
          EOF
          )

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
          else
            echo "Creating new PR"
            gh pr create \
              --title "chore: update mcpchecker evaluation results" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          fi
