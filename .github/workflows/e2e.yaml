name: E2E Tests

on:
  pull_request:
    branches: ['main']
    paths-ignore:
      - '.gitignore'
      - 'LICENSE'
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6
        with:
          go-version-file: go.mod

      - name: Create Kind cluster
        run: make kind-create-cluster

      - name: Build and load e2e image
        run: make e2e-image

      - name: Run e2e tests
        env:
          KUBECONFIG: ${{ github.workspace }}/_output/kubeconfig
        run: make e2e-test

      - name: Cleanup
        if: always()
        run: make kind-delete-cluster
