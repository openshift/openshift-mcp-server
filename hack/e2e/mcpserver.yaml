apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: kubernetes-mcp-server
  namespace: openshift-mcp-server-e2e
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: IMAGE_PLACEHOLDER
  config:
    port: 8080
    arguments:
      - --config
      - /etc/mcp-config/config.toml
    storage:
      - path: /etc/mcp-config
        source:
          type: ConfigMap
          configMap:
            name: mcp-server-e2e-config
  runtime:
    security:
      serviceAccountName: mcp-server-e2e
