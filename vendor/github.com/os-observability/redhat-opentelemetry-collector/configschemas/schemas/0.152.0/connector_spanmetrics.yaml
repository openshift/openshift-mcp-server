$schema: https://json-schema.org/draft/2020-12/schema
title: spanmetrics connector configuration
type: object
properties:
    add_resource_attributes:
        description: |-
            Add the resource attributes to the resulting metrics (disabled by default)
            This option enables the old behavior
            https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/42103
        type: boolean
    aggregation_cardinality_limit:
        type: integer
    aggregation_temporality:
        type: string
    calls_dimensions:
        type: array
        items:
            type: object
            properties:
                default:
                    type: string
                name:
                    type: string
            additionalProperties: false
    dimensions:
        description: |-
            Dimensions defines the list of additional dimensions on top of the provided:
            - service.name
            - span.name
            - span.kind
            - status.code
            - collector.instance.id
            The dimensions will be fetched from the span's attributes. Examples of some conventionally used attributes:
            https://github.com/open-telemetry/opentelemetry-collector/blob/main/model/semconv/opentelemetry.go.
        type: array
        items:
            type: object
            properties:
                default:
                    type: string
                name:
                    type: string
            additionalProperties: false
    dimensions_cache_size:
        description: |-
            DimensionsCacheSize defines the size of cache for storing Dimensions, which helps to avoid cache memory growing
            indefinitely over the lifetime of the collector.
            Optional. See defaultDimensionsCacheSize in connector.go for the default value.
            Deprecated [v0.130.0]:  Please use AggregationCardinalityLimit instead
        type: integer
    enable_metrics_sampling_method:
        description: |-
            EnableMetricsSamplingMethod adds the sampling.method attribute ("extrapolated" or "counted") to metrics.
            When false (default), the attribute is not added.
        type: boolean
    events:
        description: Events defines the configuration for events section of spans.
        type: object
        properties:
            dimensions:
                description: Dimensions defines the list of dimensions to add to the events metric.
                type: array
                items:
                    type: object
                    properties:
                        default:
                            type: string
                        name:
                            type: string
                    additionalProperties: false
            enabled:
                description: Enabled is a flag to enable events.
                type: boolean
        additionalProperties: false
    exclude_dimensions:
        type: array
        items:
            type: string
    exemplars:
        description: Exemplars defines the configuration for exemplars.
        type: object
        properties:
            enabled:
                type: boolean
            max_per_data_point:
                type: integer
        additionalProperties: false
    histogram:
        type: object
        properties:
            dimensions:
                type: array
                items:
                    type: object
                    properties:
                        default:
                            type: string
                        name:
                            type: string
                    additionalProperties: false
            disable:
                type: boolean
            explicit:
                type: object
                properties:
                    buckets:
                        description: Buckets is the list of durations representing explicit histogram buckets.
                        type: array
                        items:
                            type: string
                            pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                additionalProperties: false
            exponential:
                type: object
                properties:
                    max_size:
                        type: integer
                additionalProperties: false
            unit:
                type: integer
        additionalProperties: false
    include_instrumentation_scope:
        type: array
        items:
            type: string
    metric_timestamp_cache_size:
        description: TimestampCacheSize controls the size of the cache used to keep track of delta metrics' TimestampUnixNano the last time it was flushed
        type: integer
    metrics_expiration:
        description: |-
            MetricsExpiration is the time period after which, if no new spans are received, metrics are considered stale and will no longer be exported.
            Default value (0) means that the metrics will never expire.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metrics_flush_interval:
        description: MetricsEmitInterval is the time period between when metrics are flushed or emitted to the configured MetricsExporter.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    namespace:
        description: Namespace is the namespace of the metrics emitted by the connector.
        type: string
    resource_metrics_cache_size:
        description: |-
            ResourceMetricsCacheSize defines the size of the cache holding metrics for a service. This is mostly relevant for
            cumulative temporality to avoid memory leaks and correct metric timestamp resets.
            Optional. See defaultResourceMetricsCacheSize in connector.go for the default value.
        type: integer
    resource_metrics_key_attributes:
        description: |-
            ResourceMetricsKeyAttributes filters the resource attributes used to create the resource metrics key hash.
            This can be used to avoid situations where resource attributes may change across service restarts, causing
            metric counters to break (and duplicate). A resource does not need to have all of the attributes. The list
            must include enough attributes to properly identify unique resources or risk aggregating data from more
            than one service and span.
            e.g. ["service.name", "telemetry.sdk.language", "telemetry.sdk.name"]
            See https://opentelemetry.io/docs/specs/semconv/resource/ for possible attributes.
        type: array
        items:
            type: string
additionalProperties: false
