                                type: boolean
                        additionalProperties: false
                    cloud.region:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
            tags:
                description: |-
                    Tags is a list of regex's to match azure instance tag keys that users want
                    to add as resource attributes to processed data
                type: array
                items:
                    type: string
        additionalProperties: false
    compression:
        description: The compression key for supported compression types within collector.
        type: string
    compression_params:
        description: Advanced configuration options for the Compression
        type: object
        properties:
            level:
                type: integer
        additionalProperties: false
    consul:
        description: ConsulConfig contains user-specified configurations for the Consul detector
        type: object
        properties:
            address:
                description: Address is the address of the Consul server
                type: string
            datacenter:
                description: Datacenter to use. If not provided, the default agent datacenter is used.
                type: string
            meta:
                description: |-
                    Allowlist of [Consul
                    Metadata](https://www.consul.io/docs/agent/options#node_meta) keys to use as
                    resource attributes.
                type: object
                additionalProperties: {}
            namespace:
                description: |-
                    Namespace is the name of the namespace to send along for the request
                    when no other Namespace is present in the QueryOptions
                type: string
            resource_attributes:
                description: ResourceAttributes configuration for Consul detector
                type: object
                properties:
                    cloud.region:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
            token:
                description: |-
                    Token is used to provide a per-request ACL token
                    which overrides the agent's default (empty) token.
                    Token or Tokenfile are only required if [Consul's ACL
                    System](https://www.consul.io/docs/security/acl/acl-system) is enabled.
                type: string
            token_file:
                description: |-
                    TokenFile is a file containing the current token to use for this client.
                    If provided it is read once at startup and never again.
                    Token or Tokenfile are only required if [Consul's ACL
                    System](https://www.consul.io/docs/security/acl/acl-system) is enabled.
                type: string
        additionalProperties: false
    cookies:
        description: Cookies configures the cookie management of the HTTP client.
        type: object
    detectors:
        description: |-
            Detectors is an ordered list of named detectors that should be
            run to attempt to detect resource information.
        type: array
        items:
            type: string
    digitalocean:
        description: DigitalOceanConfig contains user-specified configurations for the digitalocean detector
        type: object
        properties:
            resource_attributes:
                type: object
                properties:
                    cloud.provider:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.region:
