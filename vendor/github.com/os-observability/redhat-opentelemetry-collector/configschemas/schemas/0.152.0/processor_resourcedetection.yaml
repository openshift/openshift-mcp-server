                        additionalProperties: false
                    os.type:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    ec2:
        description: EC2Config contains user-specified configurations for the EC2 detector
        type: object
        properties:
            fail_on_missing_metadata:
                type: boolean
            max_attempts:
                type: integer
            max_backoff:
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            resource_attributes:
                type: object
                properties:
                    cloud.account.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.availability_zone:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.platform:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.provider:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.region:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.image.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.type:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
            tags:
                description: |-
                    Tags is a list of regex's to match ec2 instance tag keys that users want
                    to add as resource attributes to processed data
                type: array
                items:
                    type: string
            tags_from_imds:
                description: |-
                    TagsFromIMDS controls whether instance tags are fetched via IMDS (true)
                    or via the EC2 DescribeTags API (false, default).
                    IMDS does not require IAM permissions but requires InstanceMetadataTags=enabled on the instance.
                    Note: IMDS must be network-accessible from the process; workloads running in containers
                    (e.g., EKS pods, ECS tasks) may not have access to IMDS even if it is enabled on the host,
                    unless the instance metadata options are configured to allow container access.
                type: boolean
        additionalProperties: false
