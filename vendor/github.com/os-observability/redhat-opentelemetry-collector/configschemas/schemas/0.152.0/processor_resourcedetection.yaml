                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.account.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.availability_zone:
                        type: object
                        properties:
                            enabled:
