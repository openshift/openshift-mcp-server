    k8snode:
        description: K8SNode contains user-specified configurations for the K8SNode detector
        type: object
        properties:
            auth_type:
                description: |-
                    How to authenticate to the K8s API server.  This can be one of `none`
                    (for no auth), `serviceAccount` (to use the standard service account
                    token provided to the agent pod), or `kubeConfig` to use credentials
                    from `~/.kube/config`.
                type: string
            context:
                description: When using auth_type `kubeConfig`, override the current context.
                type: string
            kube_api_burst:
                description: |-
                    KubeAPIBurst is the maximum burst of requests to the Kubernetes API.
                    Uses client-go's default (10) if unset. Increase if you see client-side throttling warnings.
                type: integer
            kube_api_qps:
                description: |-
                    KubeAPIQPS is the maximum number of queries per second to the Kubernetes API.
                    Uses client-go's default (5) if unset. Increase if you see client-side throttling warnings.
                type: number
            node_from_env_var:
                description: |-
                    NodeFromEnv can be used to extract the node name from an environment
                    variable. The value must be the name of the environment variable.
                    This is useful when the node a Otel agent will run on cannot be
                    predicted. In such cases, the Kubernetes downward API can be used to
                    add the node name to each pod as an environment variable. K8s tagger
                    can then read this value and filter pods by it.
                    NodeFromEnv defaults to K8S_NODE_NAME

                    For example, node name can be passed to each agent with the downward API as follows

                    env:
                      - name: K8S_NODE_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: spec.nodeName

                    Then the NodeFromEnv field can be set to `K8S_NODE_NAME` to filter all pods by the node that
                    the agent is running on.

                    More on downward API here: https://kubernetes.io/docs/tasks/inject-data-application/environment-variable-expose-pod-information/
                type: string
            resource_attributes:
                type: object
                properties:
                    k8s.node.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    k8s.node.uid:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
