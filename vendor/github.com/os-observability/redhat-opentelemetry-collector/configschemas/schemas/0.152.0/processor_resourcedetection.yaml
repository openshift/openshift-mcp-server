$schema: https://json-schema.org/draft/2020-12/schema
title: resourcedetection processor configuration
type: object
properties:
    akamai:
        description: AkamaiConfig contains user-specified configurations for the akamai detector
        type: object
        properties:
            resource_attributes:
                type: object
                properties:
                    cloud.account.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.platform:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.provider:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.region:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.image.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.image.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.type:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    aks:
        description: Aks contains user-specified configurations for the aks detector
        type: object
        properties:
            resource_attributes:
                type: object
                properties:
                    cloud.platform:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.provider:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    k8s.cluster.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    alibaba_ecs:
        description: AlibabaECSConfig contains user-specified configurations for the Alibaba Cloud ECS detector
        type: object
        properties:
            fail_on_missing_metadata:
                description: |-
                    FailOnMissingMetadata, if true, causes the detector to return an error
                    when the Alibaba Cloud ECS metadata service is unavailable or required fields are missing.
                    If false (default), the detector does best-effort population.
                type: boolean
            resource_attributes:
                description: |-
                    ResourceAttributes controls which standard resource attributes are enabled
                    (e.g., host.id, host.name, cloud.provider, etc.).
                type: object
                properties:
                    cloud.account.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.availability_zone:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.platform:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.provider:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.region:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.image.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.type:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    auth:
        description: Auth configuration for outgoing HTTP calls.
        type: object
        properties:
            authenticator:
                description: AuthenticatorID specifies the name of the extension to use in order to authenticate the incoming data point.
                type: string
        additionalProperties: false
    azure:
        description: Azure contains user-specified configurations for the azure detector
        type: object
        properties:
            resource_attributes:
                type: object
                properties:
                    azure.resourcegroup.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    azure.vm.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    azure.vm.scaleset.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    azure.vm.size:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.account.id:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.availability_zone:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.platform:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    cloud.provider:
                        type: object
