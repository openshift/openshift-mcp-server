                        additionalProperties: false
                    host.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    disable_keep_alives:
        description: |-
            DisableKeepAlives, if true, disables HTTP keep-alives and will only use the connection to the server
            for a single HTTP request.

            WARNING: enabling this option can result in significant overhead establishing a new HTTP(S)
            connection for every request. Before enabling this option please consider whether changes
            to idle connection settings can achieve your goal.
        type: boolean
    docker:
        description: DockerConfig contains user-specified configurations for the docker detector
        type: object
        properties:
            resource_attributes:
                type: object
                properties:
                    container.image.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    container.name:
                        type: object
                        properties:
                            enabled:
                                type: boolean
                        additionalProperties: false
                    host.name:
                        type: object
                        properties:
                            enabled:
