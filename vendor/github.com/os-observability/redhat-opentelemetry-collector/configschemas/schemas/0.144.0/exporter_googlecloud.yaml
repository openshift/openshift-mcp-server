$schema: https://json-schema.org/draft/2020-12/schema
title: googlecloud exporter configuration
type: object
properties:
    destination_project_quota:
        type: boolean
    impersonate:
        type: object
        properties:
            delegates:
                type: array
                items:
                    type: string
            subject:
                type: string
            target_principal:
                type: string
        additionalProperties: false
    log:
        type: object
        properties:
            compression:
                description: |-
                    Compression specifies the compression format for Metrics and Logging gRPC requests.
                    Supported values: gzip.
                type: string
            default_log_name:
                description: |-
                    DefaultLogName sets the fallback log name to use when one isn't explicitly set
                    for a log entry. If unset, logs without a log name will raise an error.
                type: string
            endpoint:
                type: string
            error_reporting_type:
                description: |-
                    ErrorReportingType enables automatically parsing error logs to a json payload containing the
                    type value for GCP Error Reporting. See https://cloud.google.com/error-reporting/docs/formatting-error-messages#log-text.
                type: boolean
            grpc_pool_size:
                description: GRPCPoolSize sets the size of the connection pool in the GCP client
                type: integer
            resource_filters:
                description: |-
                    ResourceFilters, if provided, provides a list of resource filters.
                    Resource attributes matching any filter will be included in LogEntry labels.
                    Defaults to empty, which won't include any additional resource labels.
                type: array
                items:
                    type: object
                    properties:
                        prefix:
                            type: string
                        regex:
                            description: Match resource keys by regex
                            type: string
                    additionalProperties: false
            service_resource_labels:
                description: |-
                    ServiceResourceLabels, if true, causes the exporter to copy OTel's
                    service.name, service.namespace, and service.instance.id resource attributes into the Cloud Logging LogEntry labels.
                    Disabling this option does not prevent resource_filters from adding those labels. Default is true.
                type: boolean
            use_insecure:
                description: Only has effect if Endpoint is not ""
                type: boolean
        additionalProperties: false
    metric:
        type: object
        properties:
            compression:
                description: |-
                    Compression specifies the compression format for Metrics and Logging gRPC requests.
                    Supported values: gzip.
                type: string
            create_metric_descriptor_buffer_size:
                description: |-
                    CreateMetricDescriptorBufferSize is the buffer size for the channel
                    which asynchronously calls CreateMetricDescriptor. Default is 10.
                type: integer
            create_service_timeseries:
                description: |-
                    CreateServiceTimeSeries, if true, this will send all timeseries using `CreateServiceTimeSeries`.
                    Implicitly, this sets `SkipMetricDescriptor` to true.
                type: boolean
            cumulative_normalization:
                description: |-
                    CumulativeNormalization normalizes cumulative metrics without start times or with
                    explicit reset points by subtracting subsequent points from the initial point.
                    It is enabled by default. Since it caches starting points, it may result in
                    increased memory usage.
                type: boolean
            endpoint:
                type: string
            experimental_wal_config:
                description: WALConfig holds configuration settings for the write ahead log.
                type: object
                properties:
                    directory:
                        description: Directory is the location to store WAL files.
                        type: string
                    max_backoff:
                        description: MaxBackoff sets the length of time to exponentially re-try failed exports.
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                additionalProperties: false
            grpc_pool_size:
                description: GRPCPoolSize sets the size of the connection pool in the GCP client
                type: integer
            instrumentation_library_labels:
                description: |-
                    InstrumentationLibraryLabels, if true, set the instrumentation_source
                    and instrumentation_version labels. Defaults to true.
                type: boolean
            known_domains:
                description: |-
                    KnownDomains contains a list of prefixes. If a metric already has one
                    of these prefixes, the prefix is not added.
                type: array
                items:
                    type: string
            prefix:
                type: string
            resource_filters:
                description: |-
                    ResourceFilters, if provided, provides a list of resource filters.
                    Resource attributes matching any filter will be included in metric labels.
                    Defaults to empty, which won't include any additional resource labels. Note that the
                    service_resource_labels option operates independently from resource_filters.
                type: array
                items:
                    type: object
                    properties:
                        prefix:
                            type: string
                        regex:
                            description: Match resource keys by regex
                            type: string
                    additionalProperties: false
            service_resource_labels:
                description: |-
                    ServiceResourceLabels, if true, causes the exporter to copy OTel's
                    service.name, service.namespace, and service.instance.id resource attributes into the GCM timeseries metric labels. This
                    option is recommended to avoid writing duplicate timeseries against the same monitored
                    resource. Disabling this option does not prevent resource_filters from adding those
                    labels. Default is true.
                type: boolean
            skip_create_descriptor:
                type: boolean
            sum_of_squared_deviation:
                description: |-
                    EnableSumOfSquaredDeviation enables calculation of an estimated sum of squared
                    deviation.  It isn't correct, so we don't send it by default, and don't expose
                    it to users. For some uses, it is expected, however.
                type: boolean
            use_insecure:
                description: Only has effect if Endpoint is not ""
                type: boolean
        additionalProperties: false
    project:
        description: |-
            ProjectID is the project telemetry is sent to if the gcp.project.id
            resource attribute is not set. If unspecified, this is determined using
            application default credentials.
        type: string
    sending_queue:
        type: object
        properties:
            batch:
                description: BatchConfig it configures how the requests are consumed from the queue and batch together during consumption.
                type: object
                properties:
                    flush_timeout:
                        description: FlushTimeout sets the time after which a batch will be sent regardless of its size.
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max_size:
                        description: MaxSize defines the configuration for the maximum size of a batch.
                        type: integer
                    min_size:
                        description: MinSize defines the configuration for the minimum size of a batch.
                        type: integer
                    sizer:
                        description: |-
                            Sizer determines the type of size measurement used by the batch.
                            If not configured, use the same configuration as the queue.
                            It accepts "requests", "items", or "bytes".
                        type: object
                additionalProperties: false
            block_on_overflow:
                description: |-
                    BlockOnOverflow determines the behavior when the component's TotalSize limit is reached.
                    If true, the component will wait for space; otherwise, operations will immediately return a retryable error.
                type: boolean
            num_consumers:
                description: |-
                    NumConsumers is the maximum number of concurrent consumers from the queue.
                    This applies across all different optional configurations from above (e.g. wait_for_result, block_on_overflow, storage, etc.).
                type: integer
            queue_size:
                description: QueueSize represents the maximum data size allowed for concurrent storage and processing.
                type: integer
            sizer:
                description: |-
                    Sizer determines the type of size measurement used by this component.
                    It accepts "requests", "items", or "bytes".
                type: object
            storage:
                description: |-
                    StorageID if not empty, enables the persistent storage and uses the component specified
                    as a storage extension for the persistent queue.
                    TODO: This will be changed to Optional when available.
                    See https://github.com/open-telemetry/opentelemetry-collector/issues/13822
                type: string
            wait_for_result:
                description: |-
                    WaitForResult determines if incoming requests are blocked until the request is processed or not.
                    Currently, this option is not available when persistent queue is configured using the storage configuration.
                type: boolean
        additionalProperties: false
    timeout:
        description: |-
            Timeout is the timeout for every attempt to send data to the backend.
            A zero timeout means no timeout.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    trace:
        type: object
        properties:
            attribute_mappings:
                description: |-
                    AttributeMappings determines how to map from OpenTelemetry attribute
                    keys to Google Cloud Trace keys.  By default, it changes http and
                    service keys so that they appear more prominently in the UI.
                type: array
                items:
                    type: object
                    properties:
                        key:
                            description: Key is the OpenTelemetry attribute key
                            type: string
                        replacement:
                            description: Replacement is the attribute sent to Google Cloud Trace
                            type: string
                    additionalProperties: false
            compression:
                description: |-
                    Compression specifies the compression format for Metrics and Logging gRPC requests.
                    Supported values: gzip.
                type: string
            endpoint:
                type: string
            grpc_pool_size:
                description: GRPCPoolSize sets the size of the connection pool in the GCP client
                type: integer
            use_insecure:
                description: Only has effect if Endpoint is not ""
                type: boolean
        additionalProperties: false
    user_agent:
        type: string
additionalProperties: false
