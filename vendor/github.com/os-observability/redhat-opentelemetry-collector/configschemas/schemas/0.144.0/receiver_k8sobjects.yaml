$schema: https://json-schema.org/draft/2020-12/schema
title: k8sobjects receiver configuration
type: object
properties:
    auth_type:
        description: |-
            How to authenticate to the K8s API server.  This can be one of `none`
            (for no auth), `serviceAccount` (to use the standard service account
            token provided to the agent pod), or `kubeConfig` to use credentials
            from `~/.kube/config`.
        type: string
    context:
        description: When using auth_type `kubeConfig`, override the current context.
        type: string
    error_mode:
        type: string
    include_initial_state:
        type: boolean
    k8s_leader_elector:
        type: string
    objects:
        type: array
        items:
            type: object
            properties:
                exclude_watch_type:
                    type: array
                    items:
                        type: object
                field_selector:
                    type: string
                group:
                    type: string
                interval:
                    type: string
                    pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                label_selector:
                    type: string
                mode:
                    type: string
                name:
                    type: string
                namespaces:
                    type: array
                    items:
                        type: string
                resource_version:
                    type: string
            additionalProperties: false
additionalProperties: false
