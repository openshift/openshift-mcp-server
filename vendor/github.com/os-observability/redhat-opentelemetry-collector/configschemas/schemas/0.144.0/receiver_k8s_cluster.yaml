$schema: https://json-schema.org/draft/2020-12/schema
title: k8s_cluster receiver configuration
type: object
properties:
    allocatable_types_to_report:
        description: |-
            Allocate resource types to report. See all resource types, see
            here: https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/#node-allocatable
        type: array
        items:
            type: string
    auth_type:
        description: |-
            How to authenticate to the K8s API server.  This can be one of `none`
            (for no auth), `serviceAccount` (to use the standard service account
            token provided to the agent pod), or `kubeConfig` to use credentials
            from `~/.kube/config`.
        type: string
    collection_interval:
        description: Collection interval for metrics.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    context:
        description: When using auth_type `kubeConfig`, override the current context.
        type: string
    distribution:
        description: Whether OpenShift support should be enabled or not.
        type: string
    k8s_leader_elector:
        description: |-
            K8sLeaderElector defines the reference to the k8s leader elector extension
            use this when k8s cluster receiver needs to be deployed in HA mode
        type: string
    metadata_collection_interval:
        description: |-
            Collection interval for metadata.
            Metadata of the particular entity in the cluster is collected when the entity changes.
            In addition metadata of all entities is collected periodically even if no changes happen.
            Setting the duration to 0 will disable periodic collection (however will not impact
            metadata collection on changes).
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metadata_exporters:
        description: List of exporters to which metadata from this receiver should be forwarded to.
        type: array
        items:
            type: string
    metrics:
        type: object
        properties:
            k8s.container.cpu_limit:
                type: object
                properties:
                    enabled:
