$schema: https://json-schema.org/draft/2020-12/schema
properties:
    gc_interval:
        description: Duration string (e.g., '1s', '5m', '1h')
        pattern: ^[0-9]+(ns|us|µs|ms|s|m|h)$
        type: string
    start_time_metric_regex:
        description: StartTimeMetricRegex allows specifying alternate metrics to determine start time using a regular expression. It only applies when the `start_time_metric strategy` is used.
        type: string
    strategy:
        type: string
type: object
