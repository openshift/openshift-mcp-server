$schema: https://json-schema.org/draft/2020-12/schema
properties:
    format:
        description: 'Format defines the AWS logs format. Current valid values are: - cloudwatch - vpcflow - s3access - waf - cloudtrail - elbaccess - networkfirewall'
        type: string
    vpc_flow_log:
        deprecated: true
        description: 'Deprecated: use VPCFlowLogConfig instead. It will be removed in v0.138.0'
        properties:
            file_format:
                description: fileFormat - VPC flow logs can be sent in plain text or parquet files to S3. See https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs-s3-path.html.
                type: string
            format:
                description: Format defines the custom field format of the VPC flow logs. When defined, this is used for parsing CloudWatch bound VPC flow logs.
                type: string
        type: object
    vpcflow:
        properties:
            file_format:
                description: fileFormat - VPC flow logs can be sent in plain text or parquet files to S3. See https://docs.aws.amazon.com/vpc/latest/userguide/flow-logs-s3-path.html.
                type: string
            format:
                description: Format defines the custom field format of the VPC flow logs. When defined, this is used for parsing CloudWatch bound VPC flow logs.
                type: string
        type: object
type: object
