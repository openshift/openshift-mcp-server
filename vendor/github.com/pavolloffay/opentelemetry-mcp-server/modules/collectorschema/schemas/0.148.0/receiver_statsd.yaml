$schema: https://json-schema.org/draft/2020-12/schema
title: statsd receiver configuration
type: object
properties:
    aggregation_interval:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    counter_type:
        description: |-
            CounterType specifies how counter values are represented in exported metrics.
            Valid values: "int" (default), "float", "stochastic_int".
        type: string
    dialer:
        description: DialerConfig contains options for connecting to an address.
        type: object
        properties:
            timeout:
                description: |-
                    Timeout is the maximum amount of time a dial will wait for
                    a connect to complete. The default is no timeout.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    enable_ip_only_aggregation:
        type: boolean
    enable_metric_type:
        type: boolean
    enable_simple_tags:
        type: boolean
    endpoint:
        description: |-
            Endpoint configures the address for this network connection.
            For TCP and UDP networks, the address has the form "host:port". The host must be a literal IP address,
            or a host name that can be resolved to IP addresses. The port must be a literal port number or a service name.
            If the host is a literal IPv6 address it must be enclosed in square brackets, as in "[2001:db8::1]:80" or
            "[fe80::1%zone]:80". The zone specifies the scope of the literal IPv6 address as defined in RFC 4007.
        type: string
    is_monotonic_counter:
        type: boolean
    socket_permissions:
        description: Will only be used when transport set to 'unixgram'.
        type: object
    timer_histogram_mapping:
        type: array
        items:
            type: object
            properties:
                histogram:
                    type: object
                    properties:
                        explicit_buckets:
                            type: array
                            items:
                                type: object
                                properties:
                                    buckets:
                                        type: array
                                        items:
                                            type: number
                                    matcher_pattern:
                                        type: string
                                additionalProperties: false
                        max_size:
                            type: integer
                    additionalProperties: false
                observer_type:
                    type: string
                statsd_type:
                    type: string
                summary:
                    type: object
                    properties:
                        percentiles:
                            type: array
                            items:
                                type: number
                    additionalProperties: false
            additionalProperties: false
    transport:
        description: |-
            Transport to use. Allowed protocols are "tcp", "tcp4" (IPv4-only), "tcp6" (IPv6-only), "udp", "udp4" (IPv4-only),
            "udp6" (IPv6-only), "ip", "ip4" (IPv4-only), "ip6" (IPv6-only), "unix", "unixgram" and "unixpacket".
        type: string
additionalProperties: false
