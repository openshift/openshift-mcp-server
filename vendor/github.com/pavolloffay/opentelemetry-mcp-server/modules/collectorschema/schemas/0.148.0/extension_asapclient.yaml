$schema: https://json-schema.org/draft/2020-12/schema
title: asapclient extension configuration
type: object
properties:
    audience:
        type: array
        items:
            type: string
    issuer:
        type: string
    key_id:
        type: string
    private_key:
        type: string
    ttl:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
