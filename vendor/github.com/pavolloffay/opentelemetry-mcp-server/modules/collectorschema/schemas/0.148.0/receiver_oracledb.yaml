$schema: https://json-schema.org/draft/2020-12/schema
title: oracledb receiver configuration
type: object
properties:
    collection_interval:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    datasource:
        type: string
    endpoint:
        type: string
    events:
        type: object
        properties:
            db.server.query_sample:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            db.server.top_query:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    max_query_sample_count:
        type: integer
    max_rows_per_query:
        type: integer
    metrics:
        type: object
        properties:
            oracledb.consistent_gets:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.cpu_time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.db_block_gets:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.ddl_statements_parallelized:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.dml_locks.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.dml_locks.usage:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.dml_statements_parallelized:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.enqueue_deadlocks:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.enqueue_locks.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.enqueue_locks.usage:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.enqueue_resources.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.enqueue_resources.usage:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.exchange_deadlocks:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.executions:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.hard_parses:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.logical_reads:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.logons:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.parallel_operations_downgraded_1_to_25_pct:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.parallel_operations_downgraded_25_to_50_pct:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.parallel_operations_downgraded_50_to_75_pct:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.parallel_operations_downgraded_75_to_99_pct:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.parallel_operations_downgraded_to_serial:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.parallel_operations_not_downgraded:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.parse_calls:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.pga_memory:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.physical_read_io_requests:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.physical_reads:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.physical_reads_direct:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.physical_write_io_requests:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.physical_writes:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.physical_writes_direct:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.processes.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.processes.usage:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.queries_parallelized:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.sessions.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.sessions.usage:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.tablespace_size.limit:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.tablespace_size.usage:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.transactions.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.transactions.usage:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.user_commits:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            oracledb.user_rollbacks:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    password:
        type: string
    resource_attributes:
        type: object
        properties:
            host.name:
                type: object
                properties:
                    enabled:
                        type: boolean
                    events_exclude:
                        description: |-
                            Experimental: EventsExclude defines a list of filters for attribute values.
                            If the list is not empty, events with matching resource attribute values will not be emitted.
                            EventsInclude has higher priority than EventsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    events_include:
                        description: |-
                            Experimental: EventsInclude defines a list of filters for attribute values.
                            If the list is not empty, only events with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
            oracledb.instance.name:
                type: object
                properties:
                    enabled:
                        type: boolean
                    events_exclude:
                        description: |-
                            Experimental: EventsExclude defines a list of filters for attribute values.
                            If the list is not empty, events with matching resource attribute values will not be emitted.
                            EventsInclude has higher priority than EventsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    events_include:
                        description: |-
                            Experimental: EventsInclude defines a list of filters for attribute values.
                            If the list is not empty, only events with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
            service.instance.id:
                type: object
                properties:
                    enabled:
                        type: boolean
                    events_exclude:
                        description: |-
                            Experimental: EventsExclude defines a list of filters for attribute values.
                            If the list is not empty, events with matching resource attribute values will not be emitted.
                            EventsInclude has higher priority than EventsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    events_include:
                        description: |-
                            Experimental: EventsInclude defines a list of filters for attribute values.
                            If the list is not empty, only events with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    service:
        type: string
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    top_query_count:
        type: integer
    username:
        type: string
additionalProperties: false
