$schema: https://json-schema.org/draft/2020-12/schema
title: sqlserver receiver configuration
type: object
properties:
    collection_interval:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    computer_name:
        type: string
    datasource:
        type: string
    events:
        type: object
        properties:
            db.server.query_sample:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            db.server.top_query:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    instance_name:
        type: string
    lookback_time:
        description: |-
            Enabled enables the collection of the top queries by the execution time.
            It will collect the top N queries based on totalElapsedTimeDiffs during the last collection interval.
            The query statement will also be reported, hence, it is not ideal to send it as a metric. Hence
            we are reporting them as logs.
            The `N` is configured via `TopQueryCount`
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    max_query_sample_count:
        type: integer
    max_rows_per_query:
        type: integer
