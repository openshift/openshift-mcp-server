$schema: https://json-schema.org/draft/2020-12/schema
title: kubeletstats receiver configuration
type: object
properties:
    auth_type:
        description: |-
            How to authenticate to the K8s API server.  This can be one of `none`
            (for no auth), `serviceAccount` (to use the standard service account
            token provided to the agent pod), or `kubeConfig` to use credentials
            from `~/.kube/config`.
        type: string
    ca_file:
        description: |-
            Path to the CA cert. For a client this verifies the server certificate.
            For a server this verifies client certificates. If empty uses system root CA.
            (optional)
        type: string
    ca_pem:
        description: In memory PEM encoded cert. (optional)
        type: string
    cert_file:
        description: Path to the TLS cert to use for TLS required connections. (optional)
        type: string
    cert_pem:
        description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
        type: string
    cipher_suites:
        description: |-
            CipherSuites is a list of TLS cipher suites that the TLS transport can use.
            If left blank, a safe default list is used.
            See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
        type: array
        items:
            type: string
    collect_all_network_interfaces:
        description: |-
            NetworkCollectAllInterfaces allows to enable collecting metrics from all network interfaces instead of default one
            Can be set separately for Pod and Node network metrics
        type: object
        properties:
            node:
                type: boolean
            pod:
                type: boolean
        additionalProperties: false
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    context:
        description: When using auth_type `kubeConfig`, override the current context.
        type: string
    curve_preferences:
        description: |-
            contains the elliptic curves that will be used in
            an ECDHE handshake, in preference order
            Defaults to empty list and "crypto/tls" defaults are used, internally.
        type: array
        items:
            type: string
    dialer:
        description: DialerConfig contains options for connecting to an address.
        type: object
        properties:
            timeout:
                description: |-
                    Timeout is the maximum amount of time a dial will wait for
                    a connect to complete. The default is no timeout.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    endpoint:
        description: |-
            Endpoint configures the address for this network connection.
            The address has the form "host:port". The host must be a literal IP address, or a host name that can be
            resolved to IP addresses. The port must be a literal port number or a service name.
            If the host is a literal IPv6 address it must be enclosed in square brackets, as in "[2001:db8::1]:80" or
            "[fe80::1%zone]:80". The zone specifies the scope of the literal IPv6 address as defined in RFC 4007.
        type: string
    extra_metadata_labels:
        description: |-
            ExtraMetadataLabels contains list of extra metadata that should be taken from /pods endpoint
            and put as extra labels on metrics resource.
            No additional metadata is fetched by default, so there are no extra calls to /pods endpoint.
            Supported values include container.id and k8s.volume.type.
        type: array
        items:
            type: object
    include_system_ca_certs_pool:
        description: |-
            If true, load system CA certificates pool in addition to the certificates
            configured in this struct.
        type: boolean
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    insecure_skip_verify:
        description: |-
            InsecureSkipVerify controls whether the client verifies the server's
            certificate chain and host name.
        type: boolean
    k8s_api_config:
        description: Configuration of the Kubernetes API client.
        type: object
        properties:
            auth_type:
                description: |-
                    How to authenticate to the K8s API server.  This can be one of `none`
                    (for no auth), `serviceAccount` (to use the standard service account
                    token provided to the agent pod), or `kubeConfig` to use credentials
                    from `~/.kube/config`.
                type: string
            context:
                description: When using auth_type `kubeConfig`, override the current context.
                type: string
        additionalProperties: false
    key_file:
        description: Path to the TLS key to use for TLS required connections. (optional)
        type: string
    key_pem:
        description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
        type: string
    max_version:
        description: |-
            MaxVersion sets the maximum TLS version that is acceptable.
            If not set, refer to crypto/tls for defaults. (optional)
        type: string
    metric_groups:
        description: |-
            MetricGroupsToCollect provides a list of metrics groups to collect metrics from.
            "container", "pod", "node" and "volume" are the only valid groups.
        type: array
        items:
            type: object
