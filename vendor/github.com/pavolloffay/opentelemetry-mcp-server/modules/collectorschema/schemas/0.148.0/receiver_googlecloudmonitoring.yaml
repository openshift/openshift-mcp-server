$schema: https://json-schema.org/draft/2020-12/schema
title: googlecloudmonitoring receiver configuration
type: object
properties:
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metrics_list:
        type: array
        items:
            type: object
            properties:
                metric_descriptor_filter:
                    description: |-
                        Filter for listing metric descriptors. Only support `project` and `metric.type` as filter objects.
                        See https://cloud.google.com/monitoring/api/v3/filters#metric-descriptor-filter for more details.
                    type: string
                metric_name:
                    type: string
            additionalProperties: false
    project_id:
        type: string
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
