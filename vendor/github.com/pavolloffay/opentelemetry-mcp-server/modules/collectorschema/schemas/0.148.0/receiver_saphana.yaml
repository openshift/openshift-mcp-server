                        type: boolean
                additionalProperties: false
            saphana.service.memory.compactors.allocated:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.memory.compactors.freeable:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.memory.effective_limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.memory.heap.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.memory.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.memory.shared.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.memory.used:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.stack_size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.thread.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.transaction.blocked:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.transaction.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.uptime:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.volume.operation.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.volume.operation.size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.volume.operation.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    min_version:
        description: |-
            MinVersion sets the minimum TLS version that is acceptable.
            If not set, TLS 1.2 will be used. (optional)
        type: string
    password:
        type: string
    reload_interval:
        description: |-
            ReloadInterval specifies the duration after which the certificate will be reloaded
            If not set, it will never be reloaded (optional)
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    resource_attributes:
        type: object
        properties:
            db.system:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
            saphana.host:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    server_name_override:
        description: |-
            ServerName requested by client for virtual hosting.
            This sets the ServerName in the TLSConfig. Please refer to
            https://godoc.org/crypto/tls#Config for more information. (optional)
        type: string
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    tpm:
        description: Trusted platform module configuration
        type: object
        properties:
            auth:
                type: string
            enabled:
                type: boolean
            owner_auth:
                type: string
            path:
                description: |-
                    The path to the TPM device or Unix domain socket.
                    For instance /dev/tpm0 or /dev/tpmrm0.
                type: string
        additionalProperties: false
    username:
        type: string
additionalProperties: false
