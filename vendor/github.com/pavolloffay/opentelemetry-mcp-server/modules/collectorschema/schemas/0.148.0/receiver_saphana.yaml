                additionalProperties: false
            saphana.schema.record.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.code_size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.service.count:
