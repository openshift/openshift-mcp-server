$schema: https://json-schema.org/draft/2020-12/schema
title: saphana receiver configuration
type: object
properties:
    ca_file:
        description: |-
            Path to the CA cert. For a client this verifies the server certificate.
            For a server this verifies client certificates. If empty uses system root CA.
            (optional)
        type: string
    ca_pem:
        description: In memory PEM encoded cert. (optional)
        type: string
    cert_file:
        description: Path to the TLS cert to use for TLS required connections. (optional)
        type: string
    cert_pem:
        description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
        type: string
    cipher_suites:
        description: |-
            CipherSuites is a list of TLS cipher suites that the TLS transport can use.
            If left blank, a safe default list is used.
            See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
        type: array
        items:
            type: string
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    curve_preferences:
        description: |-
            contains the elliptic curves that will be used in
            an ECDHE handshake, in preference order
            Defaults to empty list and "crypto/tls" defaults are used, internally.
        type: array
        items:
            type: string
    dialer:
        description: DialerConfig contains options for connecting to an address.
        type: object
        properties:
            timeout:
                description: |-
                    Timeout is the maximum amount of time a dial will wait for
                    a connect to complete. The default is no timeout.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    endpoint:
        description: |-
            Endpoint configures the address for this network connection.
            The address has the form "host:port". The host must be a literal IP address, or a host name that can be
            resolved to IP addresses. The port must be a literal port number or a service name.
            If the host is a literal IPv6 address it must be enclosed in square brackets, as in "[2001:db8::1]:80" or
            "[fe80::1%zone]:80". The zone specifies the scope of the literal IPv6 address as defined in RFC 4007.
        type: string
    include_system_ca_certs_pool:
        description: |-
            If true, load system CA certificates pool in addition to the certificates
            configured in this struct.
        type: boolean
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    insecure:
        description: |-
            In gRPC and HTTP when set to true, this is used to disable the client transport security.
            See https://godoc.org/google.golang.org/grpc#WithInsecure for gRPC.
            Please refer to https://godoc.org/crypto/tls#Config for more information.
            (optional, default false)
        type: boolean
    insecure_skip_verify:
        description: InsecureSkipVerify will enable TLS but not verify the certificate.
        type: boolean
    key_file:
        description: Path to the TLS key to use for TLS required connections. (optional)
        type: string
    key_pem:
        description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
        type: string
    max_version:
        description: |-
            MaxVersion sets the maximum TLS version that is acceptable.
            If not set, refer to crypto/tls for defaults. (optional)
        type: string
    metrics:
        type: object
        properties:
            saphana.alert.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.backup.latest:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.column.memory.used:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.component.memory.used:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.connection.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.cpu.used:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.disk.size.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.host.memory.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.host.swap.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.instance.code_size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.instance.memory.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.instance.memory.shared.allocated:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.instance.memory.used.peak:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.license.expiration.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.license.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.license.peak:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.network.request.average_time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.network.request.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.network.request.finished.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.replication.average_time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.replication.backlog.size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.replication.backlog.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.row_store.memory.used:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.schema.memory.used.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.schema.memory.used.max:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.schema.operation.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            saphana.schema.record.compressed.count:
                type: object
                properties:
                    enabled:
