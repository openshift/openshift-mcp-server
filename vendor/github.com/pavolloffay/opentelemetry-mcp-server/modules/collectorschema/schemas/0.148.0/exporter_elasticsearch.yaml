$schema: https://json-schema.org/draft/2020-12/schema
title: elasticsearch exporter configuration
type: object
properties:
    api_key:
        description: |-
            APIKey is used to configure ApiKey based Authentication.

            https://www.elastic.co/guide/en/elasticsearch/reference/current/security-api-create-api-key.html
        type: string
    auth:
        description: Auth configuration for outgoing HTTP calls.
        type: object
        properties:
            authenticator:
                description: AuthenticatorID specifies the name of the extension to use in order to authenticate the incoming data point.
                type: string
        additionalProperties: false
    cloudid:
        description: |-
            CloudID holds the cloud ID to identify the Elastic Cloud cluster to send events to.
            https://www.elastic.co/guide/en/cloud/current/ec-cloud-id.html

            This setting is required if no URL is configured.
        type: string
    compression:
        description: The compression key for supported compression types within collector.
        type: string
    compression_params:
        description: Advanced configuration options for the Compression
        type: object
        properties:
            level:
                type: integer
        additionalProperties: false
    cookies:
        description: Cookies configures the cookie management of the HTTP client.
        type: object
    disable_keep_alives:
        description: |-
            DisableKeepAlives, if true, disables HTTP keep-alives and will only use the connection to the server
            for a single HTTP request.

            WARNING: enabling this option can result in significant overhead establishing a new HTTP(S)
            connection for every request. Before enabling this option please consider whether changes
            to idle connection settings can achieve your goal.
        type: boolean
    discover:
        type: object
        properties:
            interval:
                description: |-
                    Interval instructs the exporter to renew the list of Elasticsearch URLs
                    with the given interval. URLs will not be updated if Interval is <=0.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            on_start:
                description: |-
                    OnStart, if set, instructs the exporter to look for available Elasticsearch
                    nodes the first time the exporter connects to the cluster.
                type: boolean
        additionalProperties: false
    endpoint:
        description: 'The target URL to send data to (e.g.: http://some.url:9411/v1/traces).'
        type: string
    endpoints:
        description: |-
            Endpoints holds the Elasticsearch URLs the exporter should send events to.

            This setting is required if CloudID is not set and if the
            ELASTICSEARCH_URL environment variable is not set.
        type: array
        items:
            type: string
    flush:
        description: |-
            Deprecated: [v0.136.0] This config is now deprecated. Use `sending_queue::batch` instead.
            If this config is defined then it will be used to configure sending queue's batch provided
            sending queue's config are not explicitly defined.
        type: object
        properties:
            bytes:
                description: |-
                    Bytes sets the send buffer flushing limit.
                    Bytes is now deprecated. Use `sending_queue::batch::{min, max}_size` with `bytes`
                    sizer to configure batching based on bytes.

                    If this config option is defined then it will be used to configure `sending_queue::batch::max_size`
                    provided it is not explcitly defined.
                type: integer
            interval:
                description: |-
                    Interval configures the max age of a document in the send buffer.
                    Interval is now deprecated. Use `sending-queue::batch::flush_timeout` instead.

                    If this config option is defined then it will be used to configure `sending_queue::batch::flush_timeout`
                    provided it is not explcitly defined.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    force_attempt_http2:
        description: |-
            Enabling ForceAttemptHTTP2 forces the HTTP transport to use the HTTP/2 protocol.
            By default, this is set to true.
            NOTE: HTTP/2 does not support settings such as MaxConnsPerHost, MaxIdleConnsPerHost and MaxIdleConns.
        type: boolean
    headers:
        description: |-
            Additional headers attached to each HTTP request sent by the client.
            Existing header values are overwritten if collision happens.
            Header values are opaque since they may be sensitive.
        type: object
    http2_ping_timeout:
        description: |-
            HTTP2PingTimeout if there's no response to the ping within the configured value, the connection will be closed.
            If not set or set to 0, it defaults to 15s.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    http2_read_idle_timeout:
        description: |-
            This is needed in case you run into
            https://github.com/golang/go/issues/59690
            https://github.com/golang/go/issues/36026
            HTTP2ReadIdleTimeout if the connection has been idle for the configured value send a ping frame for health check
            0s means no health check will be performed.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    idle_conn_timeout:
        description: |-
            IdleConnTimeout is the maximum amount of time a connection will remain open before closing itself.
            By default, it is set to 90 seconds.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    include_source_on_error:
        description: |-
            IncludeSourceOnError configures whether the bulk index responses include
            a part of the source document on error.
            Defaults to nil.

            This setting requires Elasticsearch 8.18+. Using it in prior versions
            have no effect.

            NOTE: The default behavior if this configuration is not set, is to
            discard the error reason entirely, i.e. only the error type is returned.

            WARNING: If set to true, the exporter may log error responses containing
            request payload, causing potential sensitive data to be exposed in logs.
            Users are expected to sanitize the responses themselves.
        type: boolean
    log_failed_docs_input:
        type: boolean
    log_failed_docs_input_rate_limit:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    log_request_body:
        type: boolean
    log_response_body:
        type: boolean
    logs_dynamic_id:
        description: LogsDynamicID configures whether log record attribute `elasticsearch.document_id` is set as the document ID in ES.
        type: object
        properties:
            enabled:
                type: boolean
        additionalProperties: false
    logs_dynamic_index:
        type: object
        properties:
            enabled:
                description: |-
                    Enabled enables dynamic index routing.

                    Deprecated: [v0.122.0] This config is now ignored. Dynamic index routing is always done by default.
                type: boolean
        additionalProperties: false
    logs_dynamic_pipeline:
        description: LogsDynamicPipeline configures whether log record attribute `elasticsearch.document_pipeline` is set as the document ingest pipeline for ES.
        type: object
        properties:
            enabled:
                type: boolean
        additionalProperties: false
    logs_index:
        description: |-
            LogsIndex configures the static index used for document routing for logs.
            It should be empty if dynamic document routing is preferred.
        type: string
    logstash_format:
        type: object
        properties:
            date_format:
                type: string
            enabled:
                type: boolean
            prefix_separator:
                type: string
        additionalProperties: false
    mapping:
        type: object
        properties:
            allowed_modes:
                description: |-
                    AllowedModes controls the allowed document mapping modes
                    specified through X-Elastic-Mapping-Mode client metadata.

                    If unspecified, all mapping modes are allowed.
                type: array
                items:
                    type: string
            mode:
                description: |-
                    Deprecated: [v0.145.0] Mode is ignored. The default mapping mode is "otel".

                    The mode may be overridden in two ways:
                     - by the client metadata key X-Elastic-Mapping-Mode, if specified
                     - by the scope attribute elastic.mapping.mode, if specified

                    The order of precedence is:
                      scope attribute > client metadata > default mode.
                type: string
        additionalProperties: false
    max_conns_per_host:
        description: |-
            MaxConnsPerHost limits the total number of connections per host, including connections in the dialing,
            active, and idle states. Default is 0 (unlimited).
        type: integer
    max_idle_conns:
        description: |-
            MaxIdleConns is used to set a limit to the maximum idle HTTP connections the client can keep open.
            By default, it is set to 100. Zero means no limit.
        type: integer
    max_idle_conns_per_host:
        description: |-
            MaxIdleConnsPerHost is used to set a limit to the maximum idle HTTP connections the host can keep open.
            If zero, [net/http.DefaultMaxIdleConnsPerHost] is used.
        type: integer
    metadata_keys:
        description: |-
            Experimental: MetadataKeys defines a list of client.Metadata keys that
            will be used as partition keys for when batcher is enabled and will be
            added to the exporter's telemetry if defined. The config only applies
            when `sending_queue::batch` is defined or when the, now deprecated, batcher
            is used (set to `true` or `false`). The metadata keys are converted to
            lower case as key lookups for client metadata is case insensitive. This
            means that the metric produced by internal telemetry will also have the
            attribute in lower case.

            Keys are case-insensitive and duplicates will trigger a validation error.
        type: array
        items:
            type: string
    metrics_dynamic_index:
        type: object
        properties:
            enabled:
                description: |-
                    Enabled enables dynamic index routing.

                    Deprecated: [v0.122.0] This config is now ignored. Dynamic index routing is always done by default.
                type: boolean
        additionalProperties: false
    metrics_index:
        description: |-
            MetricsIndex configures the static index used for document routing for metrics.
            It should be empty if dynamic document routing is preferred.
        type: string
    middlewares:
        description: |-
            Middlewares are used to add custom functionality to the HTTP client.
            Middleware handlers are called in the order they appear in this list,
            with the first middleware becoming the outermost handler.
        type: array
        items:
            type: object
            properties:
                id:
                    description: ID specifies the name of the extension to use.
                    type: string
            additionalProperties: false
    num_workers:
        description: |-
            NumWorkers configures the number of workers publishing bulk requests.

            Deprecated: [v0.136.0] This config is now deprecated. Use `sending_queue::num_consumers`
            instead. If this config is defined and `sending_queue::num_consumers` is not defined then
            it will be used to set `sending_queue::num_consumers`.
        type: integer
    password:
        description: Password is used to configure HTTP Basic Authentication.
        type: string
    pipeline:
        description: |-
            Pipeline configures the ingest node pipeline name that should be used to process the
            events.

            https://www.elastic.co/guide/en/elasticsearch/reference/current/ingest.html
        type: string
    proxy_url:
        description: ProxyURL setting for the collector
        type: string
    read_buffer_size:
        description: |-
            ReadBufferSize for HTTP client. See http.Transport.ReadBufferSize.
            Default is 0.
        type: integer
    retry:
        type: object
        properties:
            enabled:
                description: Enabled allows users to disable retry without having to comment out all settings.
                type: boolean
            initial_interval:
                description: InitialInterval configures the initial waiting time if a request failed.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            max_interval:
                description: MaxInterval configures the max waiting time if consecutive requests failed.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            max_requests:
                description: |-
                    MaxRequests configures how often an HTTP request is attempted before it is assumed to be failed.

                    Deprecated: use MaxRetries instead.
                type: integer
            max_retries:
                description: MaxRetries configures how many times an HTTP request is retried.
                type: integer
            retry_on_status:
                description: RetryOnStatus configures the status codes that trigger request or document level retries.
                type: array
                items:
                    type: integer
        additionalProperties: false
    sending_queue:
        description: |-
            QueueBatchConfig configures the sending queue and the batching done
            by the exporter. The performed batching can further be customized by
            configuring `metadata_keys` which will be used to partition the batches.
        type: object
        properties:
            batch:
                description: BatchConfig it configures how the requests are consumed from the queue and batch together during consumption.
                type: object
                properties:
                    flush_timeout:
                        description: FlushTimeout sets the time after which a batch will be sent regardless of its size.
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max_size:
                        description: MaxSize defines the configuration for the maximum size of a batch.
                        type: integer
                    min_size:
                        description: MinSize defines the configuration for the minimum size of a batch.
                        type: integer
                    partition:
                        description: Partition defines the partitioning of the batches configuration.
                        type: object
                        properties:
                            metadata_keys:
                                description: |-
                                    MetadataKeys is a list of client.Metadata keys that will be used to partition
                                    the data into batches. If this setting is empty, a single batcher instance
                                    will be used. When this setting is not empty, one batcher will be used per
                                    distinct combination of values for the listed metadata keys.

                                    Empty value and unset metadata are treated as distinct cases.

                                    Entries are case-insensitive. Duplicated entries will trigger a validation error.
                                type: array
                                items:
                                    type: string
                        additionalProperties: false
                    sizer:
                        description: |-
                            Sizer determines the type of size measurement used by the batch.
                            If not configured, use the same configuration as the queue.
                            It accepts "requests", "items", or "bytes".
                        type: object
                additionalProperties: false
            block_on_overflow:
                description: |-
                    BlockOnOverflow determines the behavior when the component's TotalSize limit is reached.
                    If true, the component will wait for space; otherwise, operations will immediately return a retryable error.
                type: boolean
            num_consumers:
                description: |-
                    NumConsumers is the maximum number of concurrent consumers from the queue.
                    This applies across all different optional configurations from above (e.g. wait_for_result, block_on_overflow, storage, etc.).
                type: integer
            queue_size:
                description: QueueSize represents the maximum data size allowed for concurrent storage and processing.
                type: integer
            sizer:
                description: |-
                    Sizer determines the type of size measurement used by this component.
                    It accepts "requests", "items", or "bytes".
                type: object
            storage:
                description: |-
                    StorageID if not empty, enables the persistent storage and uses the component specified
                    as a storage extension for the persistent queue.
                    TODO: This will be changed to Optional when available.
                    See https://github.com/open-telemetry/opentelemetry-collector/issues/13822
                type: string
            wait_for_result:
                description: |-
                    WaitForResult determines if incoming requests are blocked until the request is processed or not.
                    Currently, this option is not available when persistent queue is configured using the storage configuration.
                type: boolean
        additionalProperties: false
    timeout:
        description: |-
            Timeout parameter configures `http.Client.Timeout`.
            Default is 0 (unlimited).
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    tls:
        description: TLS struct exposes TLS client configuration.
        type: object
        properties:
            ca_file:
                description: |-
                    Path to the CA cert. For a client this verifies the server certificate.
                    For a server this verifies client certificates. If empty uses system root CA.
                    (optional)
                type: string
            ca_pem:
                description: In memory PEM encoded cert. (optional)
                type: string
            cert_file:
                description: Path to the TLS cert to use for TLS required connections. (optional)
                type: string
            cert_pem:
                description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
                type: string
            cipher_suites:
                description: |-
                    CipherSuites is a list of TLS cipher suites that the TLS transport can use.
                    If left blank, a safe default list is used.
                    See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
                type: array
                items:
                    type: string
            curve_preferences:
                description: |-
                    contains the elliptic curves that will be used in
                    an ECDHE handshake, in preference order
                    Defaults to empty list and "crypto/tls" defaults are used, internally.
                type: array
                items:
                    type: string
            include_system_ca_certs_pool:
                description: |-
                    If true, load system CA certificates pool in addition to the certificates
                    configured in this struct.
                type: boolean
            insecure:
                description: |-
                    In gRPC and HTTP when set to true, this is used to disable the client transport security.
                    See https://godoc.org/google.golang.org/grpc#WithInsecure for gRPC.
                    Please refer to https://godoc.org/crypto/tls#Config for more information.
                    (optional, default false)
                type: boolean
            insecure_skip_verify:
                description: InsecureSkipVerify will enable TLS but not verify the certificate.
                type: boolean
            key_file:
                description: Path to the TLS key to use for TLS required connections. (optional)
                type: string
            key_pem:
                description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
                type: string
            max_version:
                description: |-
                    MaxVersion sets the maximum TLS version that is acceptable.
                    If not set, refer to crypto/tls for defaults. (optional)
                type: string
            min_version:
                description: |-
                    MinVersion sets the minimum TLS version that is acceptable.
                    If not set, TLS 1.2 will be used. (optional)
                type: string
            reload_interval:
                description: |-
                    ReloadInterval specifies the duration after which the certificate will be reloaded
                    If not set, it will never be reloaded (optional)
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            server_name_override:
                description: |-
                    ServerName requested by client for virtual hosting.
                    This sets the ServerName in the TLSConfig. Please refer to
                    https://godoc.org/crypto/tls#Config for more information. (optional)
                type: string
            tpm:
                description: Trusted platform module configuration
                type: object
                properties:
                    auth:
                        type: string
                    enabled:
                        type: boolean
                    owner_auth:
                        type: string
                    path:
                        description: |-
                            The path to the TPM device or Unix domain socket.
                            For instance /dev/tpm0 or /dev/tpmrm0.
                        type: string
                additionalProperties: false
        additionalProperties: false
    traces_dynamic_id:
        description: TracesDynamicID configures whether span attribute `elasticsearch.document_id` is set as the document ID in ES.
        type: object
        properties:
            enabled:
                type: boolean
        additionalProperties: false
    traces_dynamic_index:
        type: object
        properties:
            enabled:
                description: |-
                    Enabled enables dynamic index routing.

                    Deprecated: [v0.122.0] This config is now ignored. Dynamic index routing is always done by default.
                type: boolean
        additionalProperties: false
    traces_index:
        description: |-
            TracesIndex configures the static index used for document routing for metrics.
            It should be empty if dynamic document routing is preferred.
        type: string
    user:
        description: User is used to configure HTTP Basic Authentication.
        type: string
    write_buffer_size:
        description: |-
            WriteBufferSize for HTTP client. See http.Transport.WriteBufferSize.
            Default is 0.
        type: integer
additionalProperties: false
