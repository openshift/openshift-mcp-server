$schema: https://json-schema.org/draft/2020-12/schema
title: yanggrpc receiver configuration
type: object
properties:
    auth:
        description: Auth for this receiver
        type: object
        properties:
            authenticator:
                description: AuthenticatorID specifies the name of the extension to use in order to authenticate the incoming data point.
                type: string
        additionalProperties: false
    dialer:
        description: DialerConfig contains options for connecting to an address.
        type: object
        properties:
            timeout:
                description: |-
                    Timeout is the maximum amount of time a dial will wait for
                    a connect to complete. The default is no timeout.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    endpoint:
        description: |-
            Endpoint configures the address for this network connection.
            For TCP and UDP networks, the address has the form "host:port". The host must be a literal IP address,
            or a host name that can be resolved to IP addresses. The port must be a literal port number or a service name.
            If the host is a literal IPv6 address it must be enclosed in square brackets, as in "[2001:db8::1]:80" or
            "[fe80::1%zone]:80". The zone specifies the scope of the literal IPv6 address as defined in RFC 4007.
        type: string
    include_metadata:
        description: Include propagates the incoming connection's metadata to downstream consumers.
        type: boolean
    keepalive:
        description: Keepalive anchor for all the settings related to keepalive.
        type: object
        properties:
            enforcement_policy:
                type: object
                properties:
                    min_time:
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    permit_without_stream:
                        type: boolean
                additionalProperties: false
            server_parameters:
                type: object
                properties:
                    max_connection_age:
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max_connection_age_grace:
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max_connection_idle:
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    time:
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    timeout:
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                additionalProperties: false
        additionalProperties: false
    max_concurrent_streams:
        description: |-
            MaxConcurrentStreams sets the limit on the number of concurrent streams to each ServerTransport.
            It has effect only for streaming RPCs.
        type: integer
    max_recv_msg_size_mib:
        description: MaxRecvMsgSizeMiB sets the maximum size (in MiB) of messages accepted by the server.
        type: integer
    middlewares:
        description: Middlewares for the gRPC server.
        type: array
        items:
            type: object
            properties:
                id:
                    description: ID specifies the name of the extension to use.
                    type: string
            additionalProperties: false
    read_buffer_size:
        description: |-
            ReadBufferSize for gRPC server. See grpc.ReadBufferSize.
            (https://godoc.org/google.golang.org/grpc#ReadBufferSize).
        type: integer
    security:
        description: Security contains security hardening configuration
        type: object
        properties:
            allowed_clients:
                description: AllowedClients contains client IP allowlist configuration
                type: array
                items:
                    type: string
            connection_timeout:
                description: ConnectionTimeout is the maximum time to wait for new connections
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            enable_metrics:
                description: EnableMetrics enables security-related metrics collection
                type: boolean
            rate_limiting:
                description: RateLimiting contains rate limiting configuration
                type: object
                properties:
                    burst_size:
                        description: BurstSize is the maximum burst size for rate limiting
                        type: integer
                    cleanup_interval:
                        description: CleanupInterval is how often to clean up rate limiter entries
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    enabled:
                        description: Enabled indicates whether rate limiting should be enabled
                        type: boolean
                    requests_per_second:
                        description: RequestsPerSecond is the maximum number of requests per second per client
                        type: number
                additionalProperties: false
        additionalProperties: false
    tls:
        description: |-
            Configures the protocol to use TLS.
            The default value is nil, which will cause the protocol to not use TLS.
        type: object
        properties:
            ca_file:
                description: |-
                    Path to the CA cert. For a client this verifies the server certificate.
                    For a server this verifies client certificates. If empty uses system root CA.
                    (optional)
                type: string
            ca_pem:
                description: In memory PEM encoded cert. (optional)
                type: string
            cert_file:
                description: Path to the TLS cert to use for TLS required connections. (optional)
                type: string
            cert_pem:
                description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
                type: string
            cipher_suites:
                description: |-
                    CipherSuites is a list of TLS cipher suites that the TLS transport can use.
                    If left blank, a safe default list is used.
                    See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
                type: array
                items:
                    type: string
            client_ca_file:
                description: |-
                    Path to the TLS cert to use by the server to verify a client certificate. (optional)
                    This sets the ClientCAs and ClientAuth to RequireAndVerifyClientCert in the TLSConfig. Please refer to
                    https://godoc.org/crypto/tls#Config for more information. (optional)
                type: string
            client_ca_file_reload:
                description: |-
                    Reload the ClientCAs file when it is modified
                    (optional, default false)
                type: boolean
            curve_preferences:
                description: |-
                    contains the elliptic curves that will be used in
                    an ECDHE handshake, in preference order
                    Defaults to empty list and "crypto/tls" defaults are used, internally.
                type: array
                items:
                    type: string
            include_system_ca_certs_pool:
                description: |-
                    If true, load system CA certificates pool in addition to the certificates
                    configured in this struct.
                type: boolean
            key_file:
                description: Path to the TLS key to use for TLS required connections. (optional)
                type: string
            key_pem:
                description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
                type: string
            max_version:
                description: |-
                    MaxVersion sets the maximum TLS version that is acceptable.
                    If not set, refer to crypto/tls for defaults. (optional)
                type: string
            min_version:
                description: |-
                    MinVersion sets the minimum TLS version that is acceptable.
                    If not set, TLS 1.2 will be used. (optional)
                type: string
            reload_interval:
                description: |-
                    ReloadInterval specifies the duration after which the certificate will be reloaded
                    If not set, it will never be reloaded (optional)
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            tpm:
                description: Trusted platform module configuration
                type: object
                properties:
                    auth:
                        type: string
                    enabled:
                        type: boolean
                    owner_auth:
                        type: string
                    path:
                        description: |-
                            The path to the TPM device or Unix domain socket.
                            For instance /dev/tpm0 or /dev/tpmrm0.
                        type: string
                additionalProperties: false
        additionalProperties: false
    transport:
        description: |-
            Transport to use. Allowed protocols are "tcp", "tcp4" (IPv4-only), "tcp6" (IPv6-only), "udp", "udp4" (IPv4-only),
            "udp6" (IPv6-only), "ip", "ip4" (IPv4-only), "ip6" (IPv6-only), "unix", "unixgram" and "unixpacket".
        type: string
    write_buffer_size:
        description: |-
            WriteBufferSize for gRPC server. See grpc.WriteBufferSize.
            (https://godoc.org/google.golang.org/grpc#WriteBufferSize).
        type: integer
    yang:
        description: YANG contains YANG parser configuration
        type: object
        properties:
            cache_modules:
                description: CacheModules enables caching of discovered YANG modules
                type: boolean
            enable_rfc_parser:
                description: EnableRFCParser enables the RFC 6020/7950 compliant YANG parser
                type: boolean
            max_modules:
                description: MaxModules is the maximum number of YANG modules to cache
                type: integer
        additionalProperties: false
additionalProperties: false
