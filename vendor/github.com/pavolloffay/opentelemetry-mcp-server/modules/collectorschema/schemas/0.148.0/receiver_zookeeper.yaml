$schema: https://json-schema.org/draft/2020-12/schema
title: zookeeper receiver configuration
type: object
properties:
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    dialer:
        description: DialerConfig contains options for connecting to an address.
        type: object
        properties:
            timeout:
                description: |-
                    Timeout is the maximum amount of time a dial will wait for
                    a connect to complete. The default is no timeout.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    endpoint:
        description: |-
            Endpoint configures the address for this network connection.
            The address has the form "host:port". The host must be a literal IP address, or a host name that can be
            resolved to IP addresses. The port must be a literal port number or a service name.
            If the host is a literal IPv6 address it must be enclosed in square brackets, as in "[2001:db8::1]:80" or
            "[fe80::1%zone]:80". The zone specifies the scope of the literal IPv6 address as defined in RFC 4007.
        type: string
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metrics:
        type: object
        properties:
            zookeeper.connection.active:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.data_tree.ephemeral_node.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.data_tree.size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.file_descriptor.limit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.file_descriptor.open:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.follower.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.fsync.exceeded_threshold.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.latency.avg:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.latency.max:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.latency.min:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.packet.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.request.active:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.ruok:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.sync.pending:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.watch.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            zookeeper.znode.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    resource_attributes:
        type: object
        properties:
            server.state:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
            zk.version:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
