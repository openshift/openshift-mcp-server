$schema: https://json-schema.org/draft/2020-12/schema
title: snowflake receiver configuration
type: object
properties:
    account:
        type: string
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    database:
        type: string
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metrics:
        type: object
        properties:
            snowflake.billing.cloud_service.total:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            snowflake.billing.total_credit.total:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            snowflake.billing.virtual_warehouse.total:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            snowflake.billing.warehouse.cloud_service.total:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            snowflake.billing.warehouse.total_credit.total:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            snowflake.billing.warehouse.virtual_warehouse.total:
