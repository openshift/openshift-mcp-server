$schema: https://json-schema.org/draft/2020-12/schema
title: sshcheck receiver configuration
type: object
properties:
    check_sftp:
        type: boolean
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    endpoint:
        description: Endpoint is always required
        type: string
    ignore_host_key:
        description: IgnoreHostKey provides an insecure path to quickstarts and testing
        type: boolean
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    key_file:
        type: string
    known_hosts:
        description: file path to the known_hosts
        type: string
    metrics:
        type: object
        properties:
            sshcheck.duration:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            sshcheck.error:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            sshcheck.sftp_duration:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            sshcheck.sftp_error:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            sshcheck.sftp_status:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            sshcheck.status:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    password:
        type: string
    resource_attributes:
        type: object
        properties:
            ssh.endpoint:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    timeout:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    username:
        description: authentication requires a Username and either a Password or KeyFile
        type: string
additionalProperties: false
