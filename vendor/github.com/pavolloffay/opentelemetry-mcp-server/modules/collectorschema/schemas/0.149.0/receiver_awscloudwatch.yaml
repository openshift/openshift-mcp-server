$schema: https://json-schema.org/draft/2020-12/schema
title: awscloudwatch receiver configuration
type: object
properties:
    imds_endpoint:
        type: string
    logs:
        type: object
        properties:
            groups:
                type: object
                properties:
                    autodiscover:
                        type: object
                        properties:
                            account_identifiers:
                                type: array
                                items:
                                    type: string
                            include_linked_accounts:
                                type: boolean
                            limit:
                                type: integer
                            pattern:
                                type: string
                            prefix:
                                type: string
                            streams:
                                type: object
                                properties:
                                    names:
                                        type: array
                                        items:
                                            type: string
                                    prefixes:
                                        type: array
                                        items:
                                            type: string
                                additionalProperties: false
                        additionalProperties: false
                    named:
                        type: object
                        additionalProperties:
                            type: object
                additionalProperties: false
            max_events_per_request:
                type: integer
            poll_interval:
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            start_from:
                type: string
        additionalProperties: false
    profile:
        type: string
    region:
        type: string
    storage:
        type: string
additionalProperties: false
