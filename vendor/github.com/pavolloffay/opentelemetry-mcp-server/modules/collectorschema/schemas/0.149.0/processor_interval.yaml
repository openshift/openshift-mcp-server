$schema: https://json-schema.org/draft/2020-12/schema
title: interval processor configuration
type: object
properties:
    interval:
        description: Interval is the time interval at which the processor will aggregate metrics.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    pass_through:
        description: |-
            PassThrough is a configuration that determines whether gauge and summary metrics should be passed through
            as they are or aggregated.
        type: object
        properties:
            gauge:
                description: |-
                    Gauge is a flag that determines whether gauge metrics should be passed through
                    as they are or aggregated.
                type: boolean
            summary:
                description: |-
                    Summary is a flag that determines whether summary metrics should be passed through
                    as they are or aggregated.
                type: boolean
        additionalProperties: false
additionalProperties: false
