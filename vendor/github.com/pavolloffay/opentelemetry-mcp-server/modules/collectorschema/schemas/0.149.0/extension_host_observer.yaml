$schema: https://json-schema.org/draft/2020-12/schema
title: host_observer extension configuration
type: object
properties:
    refresh_interval:
        description: |-
            RefreshInterval determines how frequency at which the observer
            needs to poll for collecting information about new processes.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
