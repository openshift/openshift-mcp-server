$schema: https://json-schema.org/draft/2020-12/schema
title: azure_event_hub receiver configuration
type: object
properties:
    apply_semantic_conventions:
        type: boolean
    auth:
        type: string
    blob_checkpoint_store:
        description: |-
            BlobCheckpointStore enables distributed consumption using Azure Blob Storage
            for checkpoint coordination. When configured, the receiver uses the Azure SDK
            Processor for dynamic partition assignment across multiple collector instances.
        type: object
        properties:
            connection:
                description: |-
                    Connection is the connection string for Azure Blob Storage.
                    Required when the parent config does not use auth.
                type: string
            container_name:
                description: ContainerName is the blob container used for checkpoint data. Required.
                type: string
            storage_account_url:
                description: |-
                    StorageAccountURL is the blob service URL (e.g., https://myaccount.blob.core.windows.net).
                    Required when the parent config uses auth.
                type: string
        additionalProperties: false
    connection:
        type: string
    event_hub:
        type: object
        properties:
            name:
                description: Name is the name of the Event Hub.
                type: string
            namespace:
                description: Namespace is the fully qualified namespace of the Event Hub.
                type: string
        additionalProperties: false
    format:
        type: string
    group:
        type: string
    max_poll_events:
        type: integer
    metric_aggregation:
        type: string
    offset:
        type: string
    partition:
        type: string
    poll_rate:
        description: azeventhub lib specific
        type: integer
    storage:
        type: string
    time_formats:
        type: object
        properties:
            logs:
                type: array
                items:
                    type: string
            metrics:
                type: array
                items:
                    type: string
            traces:
                type: array
                items:
                    type: string
        additionalProperties: false
additionalProperties: false
