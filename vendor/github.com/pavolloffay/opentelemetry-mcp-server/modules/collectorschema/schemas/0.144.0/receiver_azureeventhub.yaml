$schema: https://json-schema.org/draft/2020-12/schema
properties:
    apply_semantic_conventions:
        type: boolean
    auth:
        type: object
    connection:
        type: string
    event_hub:
        properties:
            name:
                description: Name is the name of the Event Hub.
                type: string
            namespace:
                description: Namespace is the fully qualified namespace of the Event Hub.
                type: string
        type: object
    format:
        type: string
    group:
        type: string
    max_poll_events:
        type: integer
    metric_aggregation:
        type: string
    offset:
        type: string
    partition:
        type: string
    poll_rate:
        description: azeventhub lib specific
        type: integer
    storage:
        type: object
    time_formats:
        properties:
            logs:
                items:
                    type: string
                type: array
            metrics:
                items:
                    type: string
                type: array
            traces:
                items:
                    type: string
                type: array
        type: object
type: object
