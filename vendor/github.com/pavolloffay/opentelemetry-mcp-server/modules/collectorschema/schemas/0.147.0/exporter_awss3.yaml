$schema: https://json-schema.org/draft/2020-12/schema
title: awss3 exporter configuration
type: object
properties:
    encoding:
        description: Encoding to apply. If present, overrides the marshaler configuration option.
        type: string
    encoding_file_extension:
        type: string
    marshaler:
        type: string
    resource_attrs_to_s3:
        type: object
        properties:
            s3_bucket:
                description: S3Bucket indicates the mapping of the bucket name used for uploading to a specific resource attribute value.
                type: string
            s3_prefix:
                description: S3Prefix indicates the mapping of the key (directory) prefix used for writing into the bucket to a specific resource attribute value.
                type: string
        additionalProperties: false
    s3uploader:
        type: object
        properties:
            acl:
                description: ACL is the canned ACL to use when uploading objects.
                type: string
            compression:
                description: |-
                    Compression sets the algorithm used to process the payload
                    before uploading to S3.
                    Valid values are: `gzip`, `zstd`, or no value set.
                type: string
            disable_ssl:
                description: DisableSLL forces communication to happen via HTTP instead of HTTPS.
                type: boolean
            endpoint:
                description: Endpoint is the URL used for communicated with S3.
                type: string
            file_prefix:
                description: FilePrefix is the filename prefix used for the file to avoid any potential collisions.
                type: string
            region:
                type: string
            retry_max_attempts:
                description: |-
                    RetryMaxAttempts specifies the maximum number of attempts for S3 client.
                    Default is 3 (SDK default).
                type: integer
            retry_max_backoff:
                description: |-
                    RetryMaxBackoff specifies the maximum backoff delay for S3 client.
                    Default is 20 seconds (SDK default).
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            retry_mode:
                description: |-
                    RetryMode specifies the retry mode for S3 client, default is "standard".
                    Valid values are: "standard", "adaptive", or "nop".
                    "nop" will disable retry by setting the retryer to aws.NopRetryer.
                type: string
            role_arn:
                description: RoleArn is the role policy to use when interacting with S3
                type: string
            s3_base_prefix:
                description: S3BasePrefix is the root key (directory) prefix used to write the file.
                type: string
            s3_bucket:
                description: S3Bucket is the bucket name to be uploaded to.
                type: string
            s3_force_path_style:
                description: S3ForcePathStyle sets the value for force path style.
                type: boolean
            s3_partition_format:
                description: S3PartitionFormat is used to provide the rollup on how data is written. Uses [strftime](https://www.man7.org/linux/man-pages/man3/strftime.3.html) formatting.
                type: string
            s3_partition_timezone:
                description: S3PartitionTimezone is used to provide timezone for partition time. Defaults to Local timezone.
                type: string
            s3_prefix:
                description: S3Prefix is the key (directory) prefix to write to inside the bucket. Appended to S3BasePrefix if provided.
                type: string
            storage_class:
                type: string
            unique_key_func_name:
                description: |-
                    UniqueKeyFuncName specifies a function to use for generating a unique string as part of the S3 key.
                    If unspecified, a default function will be used that generates a random string.
                    Valid values are: "uuidv7"
                type: string
        additionalProperties: false
    sending_queue:
        type: object
        properties:
            batch:
                description: BatchConfig it configures how the requests are consumed from the queue and batch together during consumption.
                type: object
                properties:
                    flush_timeout:
                        description: FlushTimeout sets the time after which a batch will be sent regardless of its size.
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max_size:
                        description: MaxSize defines the configuration for the maximum size of a batch.
                        type: integer
                    min_size:
                        description: MinSize defines the configuration for the minimum size of a batch.
                        type: integer
                    partition:
                        description: Partition defines the partitioning of the batches configuration.
                        type: object
                        properties:
                            metadata_keys:
                                description: |-
                                    MetadataKeys is a list of client.Metadata keys that will be used to partition
                                    the data into batches. If this setting is empty, a single batcher instance
                                    will be used. When this setting is not empty, one batcher will be used per
                                    distinct combination of values for the listed metadata keys.

                                    Empty value and unset metadata are treated as distinct cases.

                                    Entries are case-insensitive. Duplicated entries will trigger a validation error.
                                type: array
                                items:
                                    type: string
                        additionalProperties: false
                    sizer:
                        description: |-
                            Sizer determines the type of size measurement used by the batch.
                            If not configured, use the same configuration as the queue.
                            It accepts "requests", "items", or "bytes".
                        type: object
                additionalProperties: false
            block_on_overflow:
                description: |-
                    BlockOnOverflow determines the behavior when the component's TotalSize limit is reached.
                    If true, the component will wait for space; otherwise, operations will immediately return a retryable error.
                type: boolean
            num_consumers:
                description: |-
                    NumConsumers is the maximum number of concurrent consumers from the queue.
                    This applies across all different optional configurations from above (e.g. wait_for_result, block_on_overflow, storage, etc.).
                type: integer
            queue_size:
                description: QueueSize represents the maximum data size allowed for concurrent storage and processing.
                type: integer
            sizer:
                description: |-
                    Sizer determines the type of size measurement used by this component.
                    It accepts "requests", "items", or "bytes".
                type: object
            storage:
                description: |-
                    StorageID if not empty, enables the persistent storage and uses the component specified
                    as a storage extension for the persistent queue.
                    TODO: This will be changed to Optional when available.
                    See https://github.com/open-telemetry/opentelemetry-collector/issues/13822
                type: string
            wait_for_result:
                description: |-
                    WaitForResult determines if incoming requests are blocked until the request is processed or not.
                    Currently, this option is not available when persistent queue is configured using the storage configuration.
                type: boolean
        additionalProperties: false
    timeout:
        description: |-
            Timeout is the timeout for every attempt to send data to the backend.
            A zero timeout means no timeout.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
