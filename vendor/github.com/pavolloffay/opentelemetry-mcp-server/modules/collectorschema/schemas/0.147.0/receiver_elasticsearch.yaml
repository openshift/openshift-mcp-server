    middlewares:
        description: |-
            Middlewares are used to add custom functionality to the HTTP client.
            Middleware handlers are called in the order they appear in this list,
            with the first middleware becoming the outermost handler.
        type: array
        items:
            type: object
            properties:
                id:
                    description: ID specifies the name of the extension to use.
                    type: string
            additionalProperties: false
    nodes:
        description: |-
            Nodes defines the nodes to scrape.
            See https://www.elastic.co/guide/en/elasticsearch/reference/7.9/cluster.html#cluster-nodes for which selectors may be used here.
            If Nodes is empty, no nodes will be scraped.
        type: array
        items:
            type: string
    password:
