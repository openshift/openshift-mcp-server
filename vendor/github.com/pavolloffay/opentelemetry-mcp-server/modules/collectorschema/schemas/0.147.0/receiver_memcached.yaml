$schema: https://json-schema.org/draft/2020-12/schema
title: memcached receiver configuration
type: object
properties:
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    dialer:
        description: DialerConfig contains options for connecting to an address.
        type: object
        properties:
            timeout:
                description: |-
                    Timeout is the maximum amount of time a dial will wait for
                    a connect to complete. The default is no timeout.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    endpoint:
        description: |-
            Endpoint configures the address for this network connection.
            For TCP and UDP networks, the address has the form "host:port". The host must be a literal IP address,
            or a host name that can be resolved to IP addresses. The port must be a literal port number or a service name.
            If the host is a literal IPv6 address it must be enclosed in square brackets, as in "[2001:db8::1]:80" or
            "[fe80::1%zone]:80". The zone specifies the scope of the literal IPv6 address as defined in RFC 4007.
        type: string
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metrics:
        type: object
        properties:
            memcached.bytes:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.commands:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.connections.current:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.connections.total:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.cpu.usage:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.current_items:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.evictions:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.network:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.operation_hit_ratio:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.operations:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            memcached.threads:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    transport:
        description: |-
            Transport to use. Allowed protocols are "tcp", "tcp4" (IPv4-only), "tcp6" (IPv6-only), "udp", "udp4" (IPv4-only),
            "udp6" (IPv6-only), "ip", "ip4" (IPv4-only), "ip6" (IPv6-only), "unix", "unixgram" and "unixpacket".
        type: string
additionalProperties: false
