$schema: https://json-schema.org/draft/2020-12/schema
title: mongodb receiver configuration
type: object
properties:
    auth_mechanism:
        type: string
    auth_mechanism_properties:
        type: object
        additionalProperties:
            type: string
    auth_source:
        type: string
    ca_file:
        description: |-
            Path to the CA cert. For a client this verifies the server certificate.
            For a server this verifies client certificates. If empty uses system root CA.
            (optional)
        type: string
    ca_pem:
        description: In memory PEM encoded cert. (optional)
        type: string
    cert_file:
        description: Path to the TLS cert to use for TLS required connections. (optional)
        type: string
    cert_pem:
        description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
        type: string
    cipher_suites:
        description: |-
            CipherSuites is a list of TLS cipher suites that the TLS transport can use.
            If left blank, a safe default list is used.
            See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
        type: array
        items:
            type: string
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    curve_preferences:
        description: |-
            contains the elliptic curves that will be used in
            an ECDHE handshake, in preference order
            Defaults to empty list and "crypto/tls" defaults are used, internally.
        type: array
        items:
            type: string
    direct_connection:
        type: boolean
    hosts:
        description: Deprecated - Transport option will be removed in v0.102.0
        type: array
        items:
            type: object
            properties:
                dialer:
                    description: DialerConfig contains options for connecting to an address.
                    type: object
                    properties:
                        timeout:
                            description: |-
                                Timeout is the maximum amount of time a dial will wait for
                                a connect to complete. The default is no timeout.
                            type: string
                            pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    additionalProperties: false
                endpoint:
                    description: |-
                        Endpoint configures the address for this network connection.
                        For TCP and UDP networks, the address has the form "host:port". The host must be a literal IP address,
                        or a host name that can be resolved to IP addresses. The port must be a literal port number or a service name.
                        If the host is a literal IPv6 address it must be enclosed in square brackets, as in "[2001:db8::1]:80" or
                        "[fe80::1%zone]:80". The zone specifies the scope of the literal IPv6 address as defined in RFC 4007.
                    type: string
            additionalProperties: false
    include_system_ca_certs_pool:
        description: |-
            If true, load system CA certificates pool in addition to the certificates
            configured in this struct.
        type: boolean
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    insecure:
        description: |-
            In gRPC and HTTP when set to true, this is used to disable the client transport security.
            See https://godoc.org/google.golang.org/grpc#WithInsecure for gRPC.
            Please refer to https://godoc.org/crypto/tls#Config for more information.
            (optional, default false)
        type: boolean
    insecure_skip_verify:
        description: InsecureSkipVerify will enable TLS but not verify the certificate.
        type: boolean
    key_file:
        description: Path to the TLS key to use for TLS required connections. (optional)
        type: string
    key_pem:
        description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
        type: string
    max_version:
        description: |-
            MaxVersion sets the maximum TLS version that is acceptable.
            If not set, refer to crypto/tls for defaults. (optional)
        type: string
    metrics:
        type: object
        properties:
            mongodb.active.reads:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.active.writes:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.cache.operations:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.collection.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.commands.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.connection.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.cursor.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.cursor.timeout.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.data.size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.database.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.deletes.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.document.operation.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.extent.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.flushes.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.getmores.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.global_lock.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.health:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.index.access.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.index.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.index.size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.inserts.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.lock.acquire.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.lock.acquire.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.lock.acquire.wait_count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.lock.deadlock.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.memory.usage:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.network.io.receive:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.network.io.transmit:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.network.request.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.object.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.operation.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.operation.latency.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.operation.repl.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.operation.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.page_faults:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.queries.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.repl_commands_per_sec:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.repl_deletes_per_sec:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.repl_getmores_per_sec:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.repl_inserts_per_sec:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.repl_queries_per_sec:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.repl_updates_per_sec:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.session.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.storage.size:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.updates.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.uptime:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            mongodb.wtcache.bytes.read:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    min_version:
        description: |-
            MinVersion sets the minimum TLS version that is acceptable.
            If not set, TLS 1.2 will be used. (optional)
        type: string
    password:
        type: string
    reload_interval:
        description: |-
            ReloadInterval specifies the duration after which the certificate will be reloaded
            If not set, it will never be reloaded (optional)
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    replica_set:
        type: string
    resource_attributes:
        type: object
        properties:
            server.address:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
            server.port:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
            service.instance.id:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    server_name_override:
        description: |-
            ServerName requested by client for virtual hosting.
            This sets the ServerName in the TLSConfig. Please refer to
            https://godoc.org/crypto/tls#Config for more information. (optional)
        type: string
    timeout:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    tpm:
        description: Trusted platform module configuration
        type: object
        properties:
            auth:
                type: string
            enabled:
                type: boolean
            owner_auth:
                type: string
            path:
                description: |-
                    The path to the TPM device or Unix domain socket.
                    For instance /dev/tpm0 or /dev/tpmrm0.
                type: string
        additionalProperties: false
    username:
        type: string
additionalProperties: false
