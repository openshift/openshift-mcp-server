$schema: https://json-schema.org/draft/2020-12/schema
title: docker_stats receiver configuration
type: object
properties:
    api_version:
        description: |-
            Docker client API version. If empty, the client will auto-negotiate
            the API version with the Docker daemon using version negotiation.
        type: string
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    container_labels_to_metric_labels:
        description: |-
            A mapping of container label names to MetricDescriptor label keys.
            The corresponding container label value will become the DataPoint label value
            for the mapped name.  E.g. `io.kubernetes.container.name: container_spec_name`
            would result in a MetricDescriptor label called `container_spec_name` whose
            Metric DataPoints have the value of the `io.kubernetes.container.name` container label.
        type: object
        additionalProperties:
            type: string
    endpoint:
        description: |-
            The URL of the docker server. Default is "unix:///var/run/docker.sock"
            on non-Windows and "npipe:////./pipe/docker_engine" on Windows
        type: string
    env_vars_to_metric_labels:
        description: |-
            A mapping of container environment variable names to MetricDescriptor label
            keys.  The corresponding env var values become the DataPoint label value.
            E.g. `APP_VERSION: version` would result MetricDescriptors having a label
            key called `version` whose DataPoint label values are the value of the
            `APP_VERSION` environment variable configured for that particular container, if
            present.
        type: object
        additionalProperties:
            type: string
    excluded_images:
        description: A list of filters whose matching images are to be excluded. Supports literals, globs, and regex.
        type: array
        items:
            type: string
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
