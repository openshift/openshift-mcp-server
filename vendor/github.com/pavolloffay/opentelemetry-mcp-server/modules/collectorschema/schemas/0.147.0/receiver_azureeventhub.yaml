$schema: https://json-schema.org/draft/2020-12/schema
title: azureeventhub receiver configuration
type: object
properties:
    apply_semantic_conventions:
        type: boolean
    auth:
        type: string
    connection:
        type: string
    event_hub:
        type: object
        properties:
            name:
                description: Name is the name of the Event Hub.
                type: string
            namespace:
                description: Namespace is the fully qualified namespace of the Event Hub.
                type: string
        additionalProperties: false
    format:
        type: string
    group:
        type: string
    max_poll_events:
        type: integer
    metric_aggregation:
        type: string
    offset:
        type: string
    partition:
        type: string
    poll_rate:
        description: azeventhub lib specific
        type: integer
    storage:
        type: string
    time_formats:
        type: object
        properties:
            logs:
                type: array
                items:
                    type: string
            metrics:
                type: array
                items:
                    type: string
            traces:
                type: array
                items:
                    type: string
        additionalProperties: false
additionalProperties: false
