$schema: https://json-schema.org/draft/2020-12/schema
title: active_directory_ds receiver configuration
type: object
properties:
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metrics:
        type: object
        properties:
            active_directory.ds.bind.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.ldap.bind.last_successful.time:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.ldap.bind.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.ldap.client.session.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.ldap.search.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.name_cache.hit_rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.notification.queued:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.operation.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.replication.network.io:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.replication.object.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.replication.operation.pending:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.replication.property.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.replication.sync.object.pending:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.replication.sync.request.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.replication.value.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.security_descriptor_propagations_event.queued:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.suboperation.rate:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            active_directory.ds.thread.count:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
