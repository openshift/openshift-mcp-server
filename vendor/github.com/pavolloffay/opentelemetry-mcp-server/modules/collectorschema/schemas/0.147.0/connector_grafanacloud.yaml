$schema: https://json-schema.org/draft/2020-12/schema
title: grafanacloud connector configuration
type: object
properties:
    host_identifiers:
        description: |-
            HostIdentifiers defines the list of resource attributes used to derive
            a unique `grafana.host.id` value. In most cases, this should be [ "host.id" ]
        type: array
        items:
            type: string
    metrics_flush_interval:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
