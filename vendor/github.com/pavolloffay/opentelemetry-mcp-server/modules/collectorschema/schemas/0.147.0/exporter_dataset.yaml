$schema: https://json-schema.org/draft/2020-12/schema
title: dataset exporter configuration
type: object
properties:
    api_key:
        type: string
    dataset_url:
        type: string
    debug:
        type: boolean
    decompose_complex_message_field:
        description: |-
            DecomposeComplexMessageField is an optional flag to signal that message / body of complex types (e.g. a map) should be
            decomposed / deconstructed into multiple fields. This is usually done outside of the main DataSet integration on the
            client side (e.g. as part of the attribute processor or similar) or on the server side (DataSet server side JSON parser
            for message field) and that's why this functionality is disabled by default.
        type: boolean
    decomposed_complex_message_prefix:
        description: |-
            DecomposedComplexMessagePrefix is prefix for the decomposed complex message (see DecomposeComplexMessageField).
            Default value: body.map.
        type: string
    enabled:
        description: Enabled indicates whether to not retry sending batches in case of export failure.
        type: boolean
    export_resource_info_on_event:
        description: |-
            ExportResourceInfo is optional flag to signal that the resource info is being exported to DataSet while exporting Logs.
            This is especially useful when reducing DataSet billable log volume.
            Default value: false
        type: boolean
    export_resource_prefix:
        description: |-
            ExportResourcePrefix is prefix for the resource attributes when they are exported (see ExportResourceInfo).
            Default value: resource.attributes.
        type: string
    export_scope_info_on_event:
        description: |-
            ExportScopeInfo is an optional flag that signals if scope info should be exported (when available) with each event. If scope
            information is not utilized, it makes sense to disable exporting it since it will result in increased billable log volume.
            Default value: true
        type: boolean
    export_scope_prefix:
        description: |-
            ExportScopePrefix is prefix for the scope attributes when they are exported (see ExportScopeInfo).
            Default value: scope.attributes.
        type: string
    group_by:
        type: array
        items:
            type: string
    initial_interval:
        description: InitialInterval the time to wait after the first failure before retrying.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    max_elapsed_time:
        description: |-
            MaxElapsedTime is the maximum amount of time (including retries) spent trying to send a request/batch.
            Once this value is reached, the data is discarded. If set to 0, the retries are never stopped.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    max_interval:
        description: |-
            MaxInterval is the upper bound on backoff interval. Once this value is reached the delay between
            consecutive retries will always be `MaxInterval`.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    max_lifetime:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    max_parallel_outgoing:
        type: integer
    multiplier:
        description: Multiplier is the value multiplied by the backoff interval bounds
        type: number
    purge_older_than:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    randomization_factor:
        description: |-
            RandomizationFactor is a random factor used to calculate next backoffs
            Randomized interval = RetryInterval * (1 ± RandomizationFactor)
        type: number
    retry_initial_interval:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    retry_max_elapsed_time:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    retry_max_interval:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    retry_shutdown_timeout:
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    sending_queue:
        type: object
        properties:
            batch:
                description: BatchConfig it configures how the requests are consumed from the queue and batch together during consumption.
                type: object
                properties:
                    flush_timeout:
                        description: FlushTimeout sets the time after which a batch will be sent regardless of its size.
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max_size:
                        description: MaxSize defines the configuration for the maximum size of a batch.
                        type: integer
                    min_size:
                        description: MinSize defines the configuration for the minimum size of a batch.
                        type: integer
                    partition:
                        description: Partition defines the partitioning of the batches configuration.
                        type: object
                        properties:
                            metadata_keys:
                                description: |-
                                    MetadataKeys is a list of client.Metadata keys that will be used to partition
                                    the data into batches. If this setting is empty, a single batcher instance
                                    will be used. When this setting is not empty, one batcher will be used per
                                    distinct combination of values for the listed metadata keys.

                                    Empty value and unset metadata are treated as distinct cases.

                                    Entries are case-insensitive. Duplicated entries will trigger a validation error.
                                type: array
                                items:
                                    type: string
                        additionalProperties: false
                    sizer:
                        description: |-
                            Sizer determines the type of size measurement used by the batch.
                            If not configured, use the same configuration as the queue.
                            It accepts "requests", "items", or "bytes".
                        type: object
                additionalProperties: false
            block_on_overflow:
                description: |-
                    BlockOnOverflow determines the behavior when the component's TotalSize limit is reached.
                    If true, the component will wait for space; otherwise, operations will immediately return a retryable error.
                type: boolean
            num_consumers:
                description: |-
                    NumConsumers is the maximum number of concurrent consumers from the queue.
                    This applies across all different optional configurations from above (e.g. wait_for_result, block_on_overflow, storage, etc.).
                type: integer
            queue_size:
                description: QueueSize represents the maximum data size allowed for concurrent storage and processing.
                type: integer
            sizer:
                description: |-
                    Sizer determines the type of size measurement used by this component.
                    It accepts "requests", "items", or "bytes".
                type: object
            storage:
                description: |-
                    StorageID if not empty, enables the persistent storage and uses the component specified
                    as a storage extension for the persistent queue.
                    TODO: This will be changed to Optional when available.
                    See https://github.com/open-telemetry/opentelemetry-collector/issues/13822
                type: string
            wait_for_result:
                description: |-
                    WaitForResult determines if incoming requests are blocked until the request is processed or not.
                    Currently, this option is not available when persistent queue is configured using the storage configuration.
                type: boolean
        additionalProperties: false
    server_host:
        type: string
    timeout:
        type: object
        properties:
            timeout:
                description: |-
                    Timeout is the timeout for every attempt to send data to the backend.
                    A zero timeout means no timeout.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    use_hostname:
        type: boolean
additionalProperties: false
