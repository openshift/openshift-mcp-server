$schema: https://json-schema.org/draft/2020-12/schema
title: tail_sampling processor configuration
type: object
properties:
    block_on_overflow:
        description: |-
            BlockOnOverflow determines the behavior when the component's NumTraces limit is reached.
            If true, the component will wait for space; otherwise, old traces will be evicted to make space.
        type: boolean
    decision_cache:
        description: DecisionCache holds configuration for the decision cache(s)
        type: object
        properties:
            non_sampled_cache_size:
                description: |-
                    NonSampledCacheSize specifies the size of the cache that holds the non-sampled trace IDs.
                    This value will be the maximum amount of trace IDs that the cache can hold before overwriting previous IDs.
                    For effective use, this value should be at least an order of magnitude greater than Config.NumTraces.
                    If left as default 0, a no-op DecisionCache will be used.
                type: integer
            sampled_cache_size:
                description: |-
                    SampledCacheSize specifies the size of the cache that holds the sampled trace IDs.
                    This value will be the maximum amount of trace IDs that the cache can hold before overwriting previous IDs.
                    For effective use, this value should be at least an order of magnitude greater than Config.NumTraces.
                    If left as default 0, a no-op DecisionCache will be used.
                type: integer
        additionalProperties: false
    decision_wait:
        description: |-
            DecisionWait is the time before timer handling for a trace.
            When sampling_strategy is "trace-complete", this controls decision timing.
            When sampling_strategy is "span-ingest", this controls pending cleanup finalization timing.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    decision_wait_after_root_received:
        description: |-
            DecisionWaitAfterRootReceived adds root-span-based acceleration for timer handling.
            When sampling_strategy is "trace-complete", this can make decisions earlier.
            When sampling_strategy is "span-ingest", this can finalize pending traces earlier on cleanup.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    drop_pending_traces_on_shutdown:
        description: |-
            DropPendingTracesOnShutdown will drop all traces that are part of batches that have not yet reached the decision
            wait when the processor is shutdown.
        type: boolean
    expected_new_traces_per_sec:
        description: |-
            ExpectedNewTracesPerSec sets the expected number of new traces sending to the tail sampling processor
            per second. This helps with allocating data structures with closer to actual usage size.
        type: integer
    maximum_trace_size_bytes:
        description: |-
            MaximumTraceSizeBytes is the largest size of a trace a decision will be made for.
            If the trace size exceeds this it will be dropped before the decision period to keep memory more predictable.
            A 0 value disables dropping large traces early.
        type: integer
    num_traces:
        description: |-
            NumTraces is the number of traces kept on memory. Typically most of the data
            of a trace is released after a sampling decision is taken.
        type: integer
    policies:
        description: |-
            PolicyCfgs sets the tail-based sampling policy which makes a sampling decision
            for a given trace when requested.
        type: array
        items:
            type: object
            properties:
                and:
                    description: Configs for and policy evaluator.
                    type: object
                    properties:
                        and_sub_policy:
                            type: array
                            items:
                                type: object
                    additionalProperties: false
                composite:
                    description: Configs for defining composite policy
                    type: object
                    properties:
                        composite_sub_policy:
                            type: array
                            items:
                                type: object
                                properties:
                                    and:
                                        description: Configs for and policy evaluator.
                                        type: object
                                        properties:
                                            and_sub_policy:
                                                type: array
                                                items:
                                                    type: object
                                        additionalProperties: false
                                additionalProperties: false
                        max_total_spans_per_second:
                            type: integer
                        policy_order:
                            type: array
                            items:
                                type: string
                        rate_allocation:
                            type: array
                            items:
                                type: object
                                properties:
                                    percent:
                                        type: integer
                                    policy:
                                        type: string
                                additionalProperties: false
                    additionalProperties: false
                drop:
                    description: Configs for defining drop policy
                    type: object
                    properties:
                        drop_sub_policy:
                            type: array
                            items:
                                type: object
                    additionalProperties: false
                not:
                    description: Configs for defining not policy
                    type: object
                    properties:
                        not_sub_policy:
                            type: object
                    additionalProperties: false
            additionalProperties: false
    sample_on_first_match:
        description: Make decision as soon as a policy matches
        type: boolean
    sampling_strategy:
        description: |-
            SamplingStrategy controls how/when sampling decisions are made.
            "trace-complete" (default) evaluates accumulated trace data on timer handling.
            "span-ingest" evaluates each incoming batch on ingest; terminal outcomes
            finalize immediately, and non-terminal traces are finalized on cleanup.
        type: string
    tail_storage:
        description: |-
            TailStorageID specifies an optional tail storage extension to use for buffering spans.
            If not set, in-memory tail storage is used.
            It is behind feature gate `processor.tailsamplingprocessor.tailstorageextension`.
        type: string
additionalProperties: false
