$schema: https://json-schema.org/draft/2020-12/schema
title: windowsperfcounters receiver configuration
type: object
properties:
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metrics:
        type: object
        additionalProperties:
            type: object
    perfcounters:
        type: array
        items:
            type: object
            properties:
                counters:
                    type: array
                    items:
                        type: object
                        properties:
                            attributes:
                                type: object
                                additionalProperties:
                                    type: string
                            metric:
                                type: string
                            name:
                                type: string
                            recreate_query:
                                type: boolean
                        additionalProperties: false
                instances:
                    type: array
                    items:
                        type: string
                object:
                    type: string
            additionalProperties: false
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
additionalProperties: false
