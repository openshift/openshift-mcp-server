$schema: https://json-schema.org/draft/2020-12/schema
title: transform processor configuration
type: object
properties:
    error_mode:
        description: |-
            ErrorMode determines how the processor reacts to errors that occur while processing a statement.
            Valid values are `ignore` and `propagate`.
            `ignore` means the processor ignores errors returned by statements and continues on to the next statement. This is the recommended mode.
            `propagate` means the processor returns the error up the pipeline.  This will result in the payload being dropped from the collector.
            The current default value is `propagate`, which will change to `ignore` when the `processor.transform.defaultErrorModeIgnore` feature gate is stable.
        type: string
    flatten_data:
        type: boolean
    log_statements:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
                        ErrorMode determines how the processor reacts to errors that occur while processing
                        this group of statements. When provided, it overrides the default Config ErrorMode.
                    type: string
                statements:
                    type: array
                    items:
                        type: string
            additionalProperties: false
    metric_statements:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
                        ErrorMode determines how the processor reacts to errors that occur while processing
                        this group of statements. When provided, it overrides the default Config ErrorMode.
                    type: string
                statements:
                    type: array
                    items:
                        type: string
            additionalProperties: false
    profile_statements:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
                        ErrorMode determines how the processor reacts to errors that occur while processing
                        this group of statements. When provided, it overrides the default Config ErrorMode.
                    type: string
                statements:
                    type: array
                    items:
                        type: string
            additionalProperties: false
    trace_statements:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
                        ErrorMode determines how the processor reacts to errors that occur while processing
                        this group of statements. When provided, it overrides the default Config ErrorMode.
                    type: string
                statements:
                    type: array
                    items:
                        type: string
            additionalProperties: false
additionalProperties: false
