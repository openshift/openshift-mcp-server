                                poll_interval:
                                    type: string
                                    pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                            additionalProperties: false
                        collect_audit_logs:
