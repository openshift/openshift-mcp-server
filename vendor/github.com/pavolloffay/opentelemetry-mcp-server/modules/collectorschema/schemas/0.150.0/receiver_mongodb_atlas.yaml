$schema: https://json-schema.org/draft/2020-12/schema
title: mongodb_atlas receiver configuration
type: object
properties:
    alerts:
        type: object
        properties:
            enabled:
                type: boolean
            endpoint:
                type: string
            max_pages:
                type: integer
            mode:
                type: string
            page_size:
                type: integer
            poll_interval:
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            projects:
                description: these parameters are only relevant in retrieval mode
                type: array
                items:
                    type: object
                    properties:
                        exclude_clusters:
                            type: array
                            items:
                                type: string
                        include_clusters:
                            type: array
                            items:
                                type: string
                        name:
                            type: string
                    additionalProperties: false
            secret:
                type: string
            tls:
                type: object
                properties:
                    ca_file:
                        description: |-
                            Path to the CA cert. For a client this verifies the server certificate.
                            For a server this verifies client certificates. If empty uses system root CA.
                            (optional)
                        type: string
                    ca_pem:
                        description: In memory PEM encoded cert. (optional)
                        type: string
                    cert_file:
                        description: Path to the TLS cert to use for TLS required connections. (optional)
                        type: string
                    cert_pem:
                        description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
                        type: string
                    cipher_suites:
                        description: |-
                            CipherSuites is a list of TLS cipher suites that the TLS transport can use.
                            If left blank, a safe default list is used.
                            See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
                        type: array
                        items:
                            type: string
                    client_ca_file:
                        description: |-
                            Path to the TLS cert to use by the server to verify a client certificate. (optional)
                            This sets the ClientCAs and ClientAuth to RequireAndVerifyClientCert in the TLSConfig. Please refer to
                            https://godoc.org/crypto/tls#Config for more information. (optional)
                        type: string
                    client_ca_file_reload:
                        description: |-
                            Reload the ClientCAs file when it is modified
                            (optional, default false)
                        type: boolean
                    curve_preferences:
                        description: |-
                            contains the elliptic curves that will be used in
                            an ECDHE handshake, in preference order
                            Defaults to empty list and "crypto/tls" defaults are used, internally.
                        type: array
                        items:
                            type: string
                    include_system_ca_certs_pool:
                        description: |-
                            If true, load system CA certificates pool in addition to the certificates
                            configured in this struct.
                        type: boolean
                    key_file:
                        description: Path to the TLS key to use for TLS required connections. (optional)
                        type: string
                    key_pem:
                        description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
                        type: string
                    max_version:
                        description: |-
                            MaxVersion sets the maximum TLS version that is acceptable.
                            If not set, refer to crypto/tls for defaults. (optional)
                        type: string
                    min_version:
                        description: |-
                            MinVersion sets the minimum TLS version that is acceptable.
                            If not set, TLS 1.2 will be used. (optional)
                        type: string
                    reload_interval:
                        description: |-
                            ReloadInterval specifies the duration after which the certificate will be reloaded
                            If not set, it will never be reloaded (optional)
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    tpm:
                        description: Trusted platform module configuration
                        type: object
                        properties:
                            auth:
                                type: string
                            enabled:
                                type: boolean
                            owner_auth:
                                type: string
                            path:
                                description: |-
                                    The path to the TPM device or Unix domain socket.
                                    For instance /dev/tpm0 or /dev/tpmrm0.
                                type: string
                        additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    base_url:
        type: string
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    events:
        type: object
        properties:
            max_pages:
                type: integer
            organizations:
                type: array
                items:
                    type: object
                    properties:
                        id:
                            type: string
                    additionalProperties: false
            page_size:
                type: integer
            poll_interval:
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            projects:
                type: array
                items:
                    type: object
                    properties:
                        exclude_clusters:
                            type: array
                            items:
                                type: string
                        include_clusters:
                            type: array
                            items:
                                type: string
                        name:
                            type: string
                    additionalProperties: false
            types:
                type: array
                items:
                    type: string
        additionalProperties: false
    granularity:
        type: string
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    logs:
        type: object
        properties:
            enabled:
                type: boolean
            projects:
                type: array
                items:
                    type: object
                    properties:
                        access_logs:
                            type: object
