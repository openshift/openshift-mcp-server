$schema: https://json-schema.org/draft/2020-12/schema
title: kafkametrics receiver configuration
type: object
properties:
    auth:
        description: Authentication holds Kafka authentication details.
        type: object
        properties:
            kerberos:
                description: Kerberos holds Kerberos authentication configuration.
                type: object
                properties:
                    config_file:
                        type: string
                    disable_fast_negotiation:
                        type: boolean
                    keytab_file:
                        type: string
                    password:
                        type: string
                    realm:
                        type: string
                    service_name:
                        type: string
                    use_keytab:
                        type: boolean
                    username:
                        type: string
                additionalProperties: false
            plain_text:
                description: |-
                    PlainText is an alias for SASL/PLAIN authentication.

                    Deprecated [v0.123.0]: use SASL with Mechanism set to PLAIN instead.
                type: object
                properties:
                    password:
                        type: string
                    username:
                        type: string
                additionalProperties: false
            sasl:
                description: SASL holds SASL authentication configuration.
                type: object
                properties:
                    aws_msk:
                        description: AWSMSK holds configuration specific to AWS MSK.
                        type: object
                        properties:
                            region:
                                description: Region is the AWS region the MSK cluster is based in
                                type: string
                        additionalProperties: false
                    mechanism:
                        description: |-
                            SASL Mechanism to be used, possible values are: (PLAIN, AWS_MSK_IAM_OAUTHBEARER, OAUTHBEARER,
                            SCRAM-SHA-256 or SCRAM-SHA-512).
                        type: string
                    oauthbearer_token_source:
                        description: |-
                            ID of type "extension" providing a TokenSource for OAUTHBEARER Mechanism,
                            typically named "oauth2client"
                        type: string
                    password:
                        description: Password to be used on authentication
                        type: string
                    username:
                        description: Username to be used on authentication
                        type: string
                    version:
                        description: 'SASL Protocol Version to be used, possible values are: (0, 1). Defaults to 0.'
                        type: integer
                additionalProperties: false
            tls:
                description: |-
                    TLS holds TLS configuration for connecting to Kafka brokers.

                    Deprecated [v0.124.0]: use ClientConfig.TLS instead. This will
                    be used only if ClientConfig.TLS is not set.
                type: object
                properties:
                    ca_file:
                        description: |-
                            Path to the CA cert. For a client this verifies the server certificate.
                            For a server this verifies client certificates. If empty uses system root CA.
                            (optional)
                        type: string
                    ca_pem:
                        description: In memory PEM encoded cert. (optional)
                        type: string
                    cert_file:
                        description: Path to the TLS cert to use for TLS required connections. (optional)
                        type: string
                    cert_pem:
                        description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
                        type: string
                    cipher_suites:
                        description: |-
                            CipherSuites is a list of TLS cipher suites that the TLS transport can use.
                            If left blank, a safe default list is used.
                            See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
                        type: array
                        items:
                            type: string
                    curve_preferences:
                        description: |-
                            contains the elliptic curves that will be used in
                            an ECDHE handshake, in preference order
                            Defaults to empty list and "crypto/tls" defaults are used, internally.
                        type: array
                        items:
                            type: string
                    include_system_ca_certs_pool:
                        description: |-
                            If true, load system CA certificates pool in addition to the certificates
                            configured in this struct.
                        type: boolean
                    insecure:
                        description: |-
                            In gRPC and HTTP when set to true, this is used to disable the client transport security.
                            See https://godoc.org/google.golang.org/grpc#WithInsecure for gRPC.
                            Please refer to https://godoc.org/crypto/tls#Config for more information.
                            (optional, default false)
                        type: boolean
                    insecure_skip_verify:
                        description: InsecureSkipVerify will enable TLS but not verify the certificate.
                        type: boolean
                    key_file:
                        description: Path to the TLS key to use for TLS required connections. (optional)
                        type: string
                    key_pem:
                        description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
                        type: string
                    max_version:
                        description: |-
                            MaxVersion sets the maximum TLS version that is acceptable.
                            If not set, refer to crypto/tls for defaults. (optional)
                        type: string
                    min_version:
                        description: |-
                            MinVersion sets the minimum TLS version that is acceptable.
                            If not set, TLS 1.2 will be used. (optional)
                        type: string
                    reload_interval:
                        description: |-
                            ReloadInterval specifies the duration after which the certificate will be reloaded
                            If not set, it will never be reloaded (optional)
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    server_name_override:
                        description: |-
                            ServerName requested by client for virtual hosting.
                            This sets the ServerName in the TLSConfig. Please refer to
                            https://godoc.org/crypto/tls#Config for more information. (optional)
                        type: string
                    tpm:
                        description: Trusted platform module configuration
                        type: object
                        properties:
                            auth:
                                type: string
                            enabled:
                                type: boolean
                            owner_auth:
                                type: string
                            path:
                                description: |-
                                    The path to the TPM device or Unix domain socket.
                                    For instance /dev/tpm0 or /dev/tpmrm0.
                                type: string
                        additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    brokers:
        description: Brokers holds the list of Kafka bootstrap servers (default localhost:9092).
        type: array
        items:
            type: string
    client_id:
        description: |-
            ClientID holds the client ID advertised to Kafka, which can be used for
            enforcing ACLs, throttling quotas, and more (default "otel-collector")
        type: string
    cluster_alias:
        description: Alias name of the kafka cluster
        type: string
    collection_interval:
        description: |-
            CollectionInterval sets how frequently the scraper
            should be called and used as the context timeout
            to ensure that scrapers don't exceed the interval.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    conn_idle_timeout:
        description: ConnIdleTimeout specifies the time after which idle connections are not reused and may be closed.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    group_match:
        description: GroupMatch consumer groups to collect on
        type: string
    initial_delay:
        description: |-
            InitialDelay sets the initial start delay for the scraper,
            any non positive value is assumed to be immediately.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    metadata:
        description: Metadata holds metadata-related configuration for producers and consumers.
        type: object
        properties:
            full:
                description: |-
                    Whether to maintain a full set of metadata for all topics, or just
                    the minimal set that has been necessary so far. The full set is simpler
                    and usually more convenient, but can take up a substantial amount of
                    memory if you have many topics and partitions. Defaults to true.
                type: boolean
            refresh_interval:
                description: |-
                    RefreshInterval controls the frequency at which cluster metadata is
                    refreshed. Defaults to 10 minutes.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            retry:
                description: |-
                    Retry configuration for metadata.
                    This configuration is useful to avoid race conditions when broker
                    is starting at the same time as collector.
                type: object
                properties:
                    backoff:
                        description: |-
                            How long to wait for leader election to occur before retrying
                            (default 250ms). Similar to the JVM's `retry.backoff.ms`.
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max:
                        description: |-
                            The total number of times to retry a metadata request when the
                            cluster is in the middle of a leader election or at startup (default 3).
                        type: integer
                additionalProperties: false
        additionalProperties: false
    metrics:
        type: object
        properties:
            kafka.broker.log_retention_period:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.brokers:
                type: object
                properties:
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.consumer_group.lag:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.consumer_group.lag_sum:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.consumer_group.members:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.consumer_group.offset:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.consumer_group.offset_sum:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.partition.current_offset:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.partition.oldest_offset:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.partition.replicas:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.partition.replicas_in_sync:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.topic.log_retention_period:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.topic.log_retention_size:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.topic.min_insync_replicas:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.topic.partitions:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
            kafka.topic.replication_factor:
                type: object
                properties:
                    aggregation_strategy:
                        type: string
                    attributes:
                        type: array
                        items:
                            type: object
                    enabled:
                        type: boolean
                additionalProperties: false
        additionalProperties: false
    protocol_version:
        description: |-
            ProtocolVersion defines the Kafka protocol version that the client will
            assume it is running against.
        type: string
    rack_id:
        description: |-
            RackID provides the rack identifier for this client to enable rack-aware
            replica selection when supported by the brokers. This maps to Kafka's
            standard "client.rack" setting. By default, this is empty.
        type: string
    refresh_frequency:
        description: |-
            Cluster metadata refresh frequency
            Configures the refresh frequency to update cached cluster metadata
            Defaults to 10 minutes from Sarama library

            If Metadata.RefreshInterval is set, this will be ignored.

            Deprecated [v0.122.0]: use Metadata.RefreshInterval instead.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    resolve_canonical_bootstrap_servers_only:
        description: |-
            ResolveCanonicalBootstrapServersOnly configures the Kafka client to perform
            a DNS lookup on each of the provided brokers, and then perform a reverse
            lookup on the resulting IPs to obtain the canonical hostnames to use as the
            bootstrap servers. This can be required in SASL environments.
        type: boolean
    resource_attributes:
        type: object
        properties:
            kafka.cluster.alias:
                type: object
                properties:
                    enabled:
                        type: boolean
                    metrics_exclude:
                        description: |-
                            Experimental: MetricsExclude defines a list of filters for attribute values.
                            If the list is not empty, metrics with matching resource attribute values will not be emitted.
                            MetricsInclude has higher priority than MetricsExclude.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                    metrics_include:
                        description: |-
                            Experimental: MetricsInclude defines a list of filters for attribute values.
                            If the list is not empty, only metrics with matching resource attribute values will be emitted.
                        type: array
                        items:
                            type: object
                            properties:
                                regexp:
                                    type: string
                                strict:
                                    type: string
                            additionalProperties: false
                additionalProperties: false
        additionalProperties: false
    scrapers:
        description: Scrapers defines which metric data points to be captured from kafka
        type: array
        items:
            type: string
    timeout:
        description: Timeout is an optional value used to set scraper's context deadline.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    tls:
        description: |-
            TLS holds TLS-related configuration for connecting to Kafka brokers.

            By default the client will use an insecure connection unless
            SASL/AWS_MSK_IAM_OAUTHBEARER auth is configured.
        type: object
        properties:
            ca_file:
                description: |-
                    Path to the CA cert. For a client this verifies the server certificate.
                    For a server this verifies client certificates. If empty uses system root CA.
                    (optional)
                type: string
            ca_pem:
                description: In memory PEM encoded cert. (optional)
                type: string
            cert_file:
                description: Path to the TLS cert to use for TLS required connections. (optional)
                type: string
            cert_pem:
                description: In memory PEM encoded TLS cert to use for TLS required connections. (optional)
                type: string
            cipher_suites:
                description: |-
                    CipherSuites is a list of TLS cipher suites that the TLS transport can use.
                    If left blank, a safe default list is used.
                    See https://go.dev/src/crypto/tls/cipher_suites.go for a list of supported cipher suites.
                type: array
                items:
                    type: string
            curve_preferences:
                description: |-
                    contains the elliptic curves that will be used in
                    an ECDHE handshake, in preference order
                    Defaults to empty list and "crypto/tls" defaults are used, internally.
                type: array
                items:
                    type: string
            include_system_ca_certs_pool:
                description: |-
                    If true, load system CA certificates pool in addition to the certificates
                    configured in this struct.
                type: boolean
            insecure:
                description: |-
                    In gRPC and HTTP when set to true, this is used to disable the client transport security.
                    See https://godoc.org/google.golang.org/grpc#WithInsecure for gRPC.
                    Please refer to https://godoc.org/crypto/tls#Config for more information.
                    (optional, default false)
                type: boolean
            insecure_skip_verify:
                description: InsecureSkipVerify will enable TLS but not verify the certificate.
                type: boolean
            key_file:
                description: Path to the TLS key to use for TLS required connections. (optional)
                type: string
            key_pem:
                description: In memory PEM encoded TLS key to use for TLS required connections. (optional)
                type: string
            max_version:
                description: |-
                    MaxVersion sets the maximum TLS version that is acceptable.
                    If not set, refer to crypto/tls for defaults. (optional)
                type: string
            min_version:
                description: |-
                    MinVersion sets the minimum TLS version that is acceptable.
                    If not set, TLS 1.2 will be used. (optional)
                type: string
            reload_interval:
                description: |-
                    ReloadInterval specifies the duration after which the certificate will be reloaded
                    If not set, it will never be reloaded (optional)
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            server_name_override:
                description: |-
                    ServerName requested by client for virtual hosting.
                    This sets the ServerName in the TLSConfig. Please refer to
                    https://godoc.org/crypto/tls#Config for more information. (optional)
                type: string
            tpm:
                description: Trusted platform module configuration
                type: object
                properties:
                    auth:
                        type: string
                    enabled:
                        type: boolean
                    owner_auth:
                        type: string
                    path:
                        description: |-
                            The path to the TPM device or Unix domain socket.
                            For instance /dev/tpm0 or /dev/tpmrm0.
                        type: string
                additionalProperties: false
        additionalProperties: false
    topic_match:
        description: TopicMatch topics to collect metrics on
        type: string
    use_leader_epoch:
        description: |-
            When enabled, the consumer uses the leader epoch returned by brokers (KIP-320)
            to detect log truncation. Setting this to false clears the leader epoch from
            fetch offsets, disabling KIP-320. Disabling can improve compatibility with
            brokers that don’t fully support leader epochs (e.g., Azure Event Hubs),
            at the cost of losing automatic log-truncation safety.

            NOTE: this is experimental and may be removed in a future release.
        type: boolean
additionalProperties: false
