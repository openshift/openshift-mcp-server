$schema: https://json-schema.org/draft/2020-12/schema
title: filter processor configuration
type: object
properties:
    error_mode:
        description: |-
            ErrorMode determines how the processor reacts to errors that occur while processing an OTTL condition.
            Valid values are `ignore` and `propagate`.
            `ignore` means the processor ignores errors returned by conditions and continues on to the next condition. This is the recommended mode.
            `propagate` means the processor returns the error up the pipeline.  This will result in the payload being dropped from the collector.
            The default value is `propagate`. It will change to `ignore` when the `processor.filter.defaultErrorModeIgnore` feature gate is stable.
        type: string
    log_conditions:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
                        ErrorMode determines how the processor reacts to errors that occur while processing
                        this group of conditions. When provided, it overrides the default Config ErrorMode.
                    type: string
            additionalProperties: false
    logs:
        description: 'Deprecated: use LogConditions instead.'
        type: object
        properties:
            exclude:
                description: |-
                    Exclude match properties describe logs that should be excluded from the Collector Service pipeline,
                    all other logs should be included.
                    If both Include and Exclude are specified, Include filtering occurs first.
                type: object
                properties:
                    bodies:
                        description: |-
                            LogBodies is a list of strings that the LogRecord's body field must match
                            against.
                        type: array
                        items:
                            type: string
                    match_type:
                        description: LogMatchType specifies the type of matching desired
                        type: string
                    record_attributes:
                        description: |-
                            RecordAttributes defines a list of possible record attributes to match logs against.
                            A match occurs if any record attribute matches at least one expression in this given list.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    resource_attributes:
                        description: |-
                            ResourceAttributes defines a list of possible resource attributes to match logs against.
                            A match occurs if any resource attribute matches all expressions in this given list.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    severity_number:
                        description: SeverityNumberProperties defines how to match against a log record's SeverityNumber, if defined.
                        type: object
                        properties:
                            match_undefined:
                                description: |-
                                    MatchUndefined lets logs records with "unknown" severity match.
                                    If MinSeverity is not set, this field is ignored, as fields are not matched based on severity.
                                type: boolean
                            min:
                                description: |-
                                    Min is the minimum severity needed for the log record to match.
                                    This corresponds to the short names specified here:
                                    https://github.com/open-telemetry/opentelemetry-specification/blob/main/specification/logs/data-model.md#displaying-severity
                                    this field is case-insensitive ("INFO" == "info")
                                type: string
                        additionalProperties: false
                    severity_texts:
                        description: |-
                            SeverityTexts is a list of strings that the LogRecord's severity text field must match
                            against.
                        type: array
                        items:
                            type: string
                additionalProperties: false
            include:
                description: |-
                    Include match properties describe logs that should be included in the Collector Service pipeline,
                    all other logs should be dropped from further processing.
                    If both Include and Exclude are specified, Include filtering occurs first.
                type: object
                properties:
                    bodies:
                        description: |-
                            LogBodies is a list of strings that the LogRecord's body field must match
                            against.
                        type: array
                        items:
                            type: string
                    match_type:
                        description: LogMatchType specifies the type of matching desired
                        type: string
                    record_attributes:
                        description: |-
                            RecordAttributes defines a list of possible record attributes to match logs against.
                            A match occurs if any record attribute matches at least one expression in this given list.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    resource_attributes:
                        description: |-
                            ResourceAttributes defines a list of possible resource attributes to match logs against.
                            A match occurs if any resource attribute matches all expressions in this given list.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    severity_number:
                        description: SeverityNumberProperties defines how to match against a log record's SeverityNumber, if defined.
                        type: object
                        properties:
                            match_undefined:
                                description: |-
                                    MatchUndefined lets logs records with "unknown" severity match.
                                    If MinSeverity is not set, this field is ignored, as fields are not matched based on severity.
                                type: boolean
                            min:
                                description: |-
                                    Min is the minimum severity needed for the log record to match.
                                    This corresponds to the short names specified here:
                                    https://github.com/open-telemetry/opentelemetry-specification/blob/main/specification/logs/data-model.md#displaying-severity
                                    this field is case-insensitive ("INFO" == "info")
                                type: string
                        additionalProperties: false
                    severity_texts:
                        description: |-
                            SeverityTexts is a list of strings that the LogRecord's severity text field must match
                            against.
                        type: array
                        items:
                            type: string
                additionalProperties: false
            log_record:
                description: |-
                    LogConditions is a list of OTTL conditions for an ottllog context.
                    If any condition resolves to true, the log event will be dropped.
                    Supports `and`, `or`, and `()`
                type: array
                items:
                    type: string
            resource:
                description: |-
                    ResourceConditions is a list of OTTL conditions for an ottlresource context.
                    If any condition resolves to true, the whole resource will be dropped.
                    Supports `and`, `or`, and `()`
                type: array
                items:
                    type: string
        additionalProperties: false
    metric_conditions:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
                        ErrorMode determines how the processor reacts to errors that occur while processing
                        this group of conditions. When provided, it overrides the default Config ErrorMode.
                    type: string
            additionalProperties: false
    metrics:
        description: 'Deprecated: use MetricConditions instead.'
        type: object
        properties:
            datapoint:
                description: |-
                    DataPointConditions is a list of OTTL conditions for an ottldatapoint context.
                    If any condition resolves to true, the datapoint will be dropped.
                    Supports `and`, `or`, and `()`
                type: array
                items:
                    type: string
            exclude:
                description: |-
                    Exclude match properties describe metrics that should be excluded from the Collector Service pipeline,
                    all other metrics should be included.
                    If both Include and Exclude are specified, Include filtering occurs first.
                type: object
                properties:
                    expressions:
                        description: |-
                            Expressions specifies the list of expr expressions to match metrics against.
                            A match occurs if any datapoint in a metric matches at least one expression in this list.
                        type: array
                        items:
                            type: string
                    match_type:
                        description: MatchType specifies the type of matching desired
                        type: string
                    metric_names:
                        description: |-
                            MetricNames specifies the list of string patterns to match metric names against.
                            A match occurs if the metric name matches at least one string pattern in this list.
                        type: array
                        items:
                            type: string
                    regexp:
                        description: RegexpConfig specifies options for the MetricRegexp match type
                        type: object
                        properties:
                            cacheenabled:
                                description: |-
                                    CacheEnabled determines whether match results are LRU cached to make subsequent matches faster.
                                    Cache size is unlimited unless CacheMaxNumEntries is also specified.
                                type: boolean
                            cachemaxnumentries:
                                description: |-
                                    CacheMaxNumEntries is the max number of entries of the LRU cache that stores match results.
                                    CacheMaxNumEntries is ignored if CacheEnabled is false.
                                type: integer
                        additionalProperties: false
                    resource_attributes:
                        description: |-
                            ResourceAttributes defines a list of possible resource attributes to match metrics against.
                            A match occurs if any resource attribute matches all expressions in this given list.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                additionalProperties: false
            include:
                description: |-
                    Include match properties describe metrics that should be included in the Collector Service pipeline,
                    all other metrics should be dropped from further processing.
                    If both Include and Exclude are specified, Include filtering occurs first.
                type: object
                properties:
                    expressions:
                        description: |-
                            Expressions specifies the list of expr expressions to match metrics against.
                            A match occurs if any datapoint in a metric matches at least one expression in this list.
                        type: array
                        items:
                            type: string
                    match_type:
                        description: MatchType specifies the type of matching desired
                        type: string
                    metric_names:
                        description: |-
                            MetricNames specifies the list of string patterns to match metric names against.
                            A match occurs if the metric name matches at least one string pattern in this list.
                        type: array
                        items:
                            type: string
                    regexp:
                        description: RegexpConfig specifies options for the MetricRegexp match type
                        type: object
                        properties:
                            cacheenabled:
                                description: |-
                                    CacheEnabled determines whether match results are LRU cached to make subsequent matches faster.
                                    Cache size is unlimited unless CacheMaxNumEntries is also specified.
                                type: boolean
                            cachemaxnumentries:
                                description: |-
                                    CacheMaxNumEntries is the max number of entries of the LRU cache that stores match results.
                                    CacheMaxNumEntries is ignored if CacheEnabled is false.
                                type: integer
                        additionalProperties: false
                    resource_attributes:
                        description: |-
                            ResourceAttributes defines a list of possible resource attributes to match metrics against.
                            A match occurs if any resource attribute matches all expressions in this given list.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                additionalProperties: false
            metric:
                description: |-
                    MetricConditions is a list of OTTL conditions for an ottlmetric context.
                    If any condition resolves to true, the metric will be dropped.
                    Supports `and`, `or`, and `()`
                type: array
                items:
                    type: string
            regexp:
                description: RegexpConfig specifies options for the regexp match type
                type: object
                properties:
                    cacheenabled:
                        description: |-
                            CacheEnabled determines whether match results are LRU cached to make subsequent matches faster.
                            Cache size is unlimited unless CacheMaxNumEntries is also specified.
                        type: boolean
                    cachemaxnumentries:
                        description: |-
                            CacheMaxNumEntries is the max number of entries of the LRU cache that stores match results.
                            CacheMaxNumEntries is ignored if CacheEnabled is false.
                        type: integer
                additionalProperties: false
            resource:
                description: |-
                    ResourceConditions is a list of OTTL conditions for an ottlresource context.
                    If any condition resolves to true, the whole resource will be dropped.
                    Supports `and`, `or`, and `()`
                type: array
                items:
                    type: string
        additionalProperties: false
    profile_conditions:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
                        ErrorMode determines how the processor reacts to errors that occur while processing
