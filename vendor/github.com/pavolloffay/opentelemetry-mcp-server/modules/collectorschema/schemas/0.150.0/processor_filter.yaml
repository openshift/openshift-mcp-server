                    type: string
            additionalProperties: false
    profiles:
        description: 'Deprecated: use ProfileConditions instead.'
        type: object
        properties:
            profile:
                description: |-
                    ProfileConditions is a list of OTTL conditions for an ottlprofile context.
                    If any condition resolves to true, the profile will be dropped.
                    Supports `and`, `or`, and `()`
                type: array
                items:
                    type: string
            resource:
                description: |-
                    ResourceConditions is a list of OTTL conditions for an ottlresource context.
                    If any condition resolves to true, the whole resource will be dropped.
                    Supports `and`, `or`, and `()`
                type: array
                items:
                    type: string
        additionalProperties: false
    spans:
        description: 'Deprecated: use TraceConditions instead.'
        type: object
        properties:
            exclude:
                description: |-
                    Exclude specifies when this processor will not be applied to the input data
                    which match the specified properties.
                    Note: The `exclude` properties are checked after the `include` properties,
                    if they exist, are checked.
                    If `include` isn't specified, the `exclude` properties are checked against
                    all input data.
                    This is an optional field. If neither `include` and `exclude` are set, all input data
                    is processed. If `exclude` is set and `include` isn't set, then all the
                    input data that does not match the properties in this structure are processed.
                type: object
                properties:
                    attributes:
                        description: |-
                            Attributes specifies the list of attributes to match against.
                            All of these attributes must match for a match to occur.
                            This is an optional field.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    libraries:
                        description: |-
                            Libraries specify the list of items to match the implementation library against.
                            A match occurs if the span's implementation library matches at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: object
                            properties:
                                name:
                                    type: string
                                version:
                                    description: |-
                                        version match
                                         expected actual  match
                                         nil      <blank> yes
                                         nil      1       yes
                                         <blank>  <blank> yes
                                         <blank>  1       no
                                         1        <blank> no
                                         1        1       yes
                                    type: string
                            additionalProperties: false
                    log_bodies:
                        description: |-
                            LogBodies is a list of strings that the LogRecord's body field must match
                            against.
                        type: array
                        items:
                            type: string
                    log_severity_number:
                        description: LogSeverityNumber defines how to match against a log record's SeverityNumber, if defined.
                        type: object
                        properties:
                            match_undefined:
                                description: |-
                                    MatchUndefined controls whether logs with "undefined" severity matches.
                                    If this is true, entries with undefined severity will match.
                                type: boolean
                            min:
                                description: |-
                                    Min is the lowest severity that may be matched.
                                    e.g. if this is plog.SeverityNumberInfo, INFO, WARN, ERROR, and FATAL logs will match.
                                type: integer
                        additionalProperties: false
                    log_severity_texts:
                        description: |-
                            LogSeverityTexts is a list of strings that the LogRecord's severity text field must match
                            against.
                        type: array
                        items:
                            type: string
                    match_type:
                        type: string
                    metric_names:
                        description: |-
                            MetricNames is a list of strings to match metric name against.
                            A match occurs if metric name matches at least one item in the list.
                            This field is optional.
                        type: array
                        items:
                            type: string
                    regexp:
                        type: object
                        properties:
                            cacheenabled:
                                description: |-
                                    CacheEnabled determines whether match results are LRU cached to make subsequent matches faster.
                                    Cache size is unlimited unless CacheMaxNumEntries is also specified.
                                type: boolean
                            cachemaxnumentries:
                                description: |-
                                    CacheMaxNumEntries is the max number of entries of the LRU cache that stores match results.
                                    CacheMaxNumEntries is ignored if CacheEnabled is false.
                                type: integer
                        additionalProperties: false
                    resources:
                        description: |-
                            Resources specify the list of items to match the resources against.
                            A match occurs if the data's resources match at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    services:
                        description: |-
                            Services specify the list of items to match service name against.
                            A match occurs if the span's service name matches at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: string
                    span_kinds:
                        description: |-
                            SpanKinds specify the list of items to match the span kind against.
                            A match occurs if the span's span kind matches at least one item in this list.
                            This is an optional field
                        type: array
                        items:
                            type: string
                    span_names:
                        description: |-
                            SpanNames specify the list of items to match span name against.
                            A match occurs if the span name matches at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: string
                additionalProperties: false
            include:
                description: |-
                    Include specifies the set of input data properties that must be present in order
                    for this processor to apply to it.
                    Note: If `exclude` is specified, the input data is compared against those
                    properties after the `include` properties.
                    This is an optional field. If neither `include` and `exclude` are set, all input data
                    are processed. If `include` is set and `exclude` isn't set, then all
                    input data matching the properties in this structure are processed.
                type: object
                properties:
                    attributes:
                        description: |-
                            Attributes specifies the list of attributes to match against.
                            All of these attributes must match for a match to occur.
                            This is an optional field.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    libraries:
                        description: |-
                            Libraries specify the list of items to match the implementation library against.
                            A match occurs if the span's implementation library matches at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: object
                            properties:
                                name:
                                    type: string
                                version:
                                    description: |-
                                        version match
                                         expected actual  match
                                         nil      <blank> yes
                                         nil      1       yes
                                         <blank>  <blank> yes
                                         <blank>  1       no
                                         1        <blank> no
                                         1        1       yes
                                    type: string
                            additionalProperties: false
                    log_bodies:
                        description: |-
                            LogBodies is a list of strings that the LogRecord's body field must match
                            against.
                        type: array
                        items:
                            type: string
                    log_severity_number:
                        description: LogSeverityNumber defines how to match against a log record's SeverityNumber, if defined.
                        type: object
                        properties:
                            match_undefined:
                                description: |-
                                    MatchUndefined controls whether logs with "undefined" severity matches.
                                    If this is true, entries with undefined severity will match.
                                type: boolean
                            min:
                                description: |-
                                    Min is the lowest severity that may be matched.
                                    e.g. if this is plog.SeverityNumberInfo, INFO, WARN, ERROR, and FATAL logs will match.
                                type: integer
                        additionalProperties: false
                    log_severity_texts:
                        description: |-
                            LogSeverityTexts is a list of strings that the LogRecord's severity text field must match
                            against.
                        type: array
                        items:
                            type: string
                    match_type:
                        type: string
                    metric_names:
                        description: |-
                            MetricNames is a list of strings to match metric name against.
                            A match occurs if metric name matches at least one item in the list.
                            This field is optional.
                        type: array
                        items:
                            type: string
                    regexp:
                        type: object
                        properties:
                            cacheenabled:
                                description: |-
                                    CacheEnabled determines whether match results are LRU cached to make subsequent matches faster.
                                    Cache size is unlimited unless CacheMaxNumEntries is also specified.
                                type: boolean
                            cachemaxnumentries:
                                description: |-
                                    CacheMaxNumEntries is the max number of entries of the LRU cache that stores match results.
                                    CacheMaxNumEntries is ignored if CacheEnabled is false.
                                type: integer
                        additionalProperties: false
                    resources:
                        description: |-
                            Resources specify the list of items to match the resources against.
                            A match occurs if the data's resources match at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: object
                            properties:
                                key:
                                    description: Key specifies the attribute key.
                                    type: string
                                value:
                                    description: |-
                                        Values specifies the value to match against.
                                        If it is not set, any value will match.
                            additionalProperties: false
                    services:
                        description: |-
                            Services specify the list of items to match service name against.
                            A match occurs if the span's service name matches at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: string
                    span_kinds:
                        description: |-
                            SpanKinds specify the list of items to match the span kind against.
                            A match occurs if the span's span kind matches at least one item in this list.
                            This is an optional field
                        type: array
                        items:
                            type: string
                    span_names:
                        description: |-
                            SpanNames specify the list of items to match span name against.
                            A match occurs if the span name matches at least one item in this list.
                            This is an optional field.
                        type: array
                        items:
                            type: string
                additionalProperties: false
        additionalProperties: false
    trace_conditions:
        type: array
        items:
            type: object
            properties:
                conditions:
                    type: array
                    items:
                        type: string
                context:
                    type: string
                error_mode:
                    description: |-
