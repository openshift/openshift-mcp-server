$schema: https://json-schema.org/draft/2020-12/schema
title: googlecloudpubsub receiver configuration
type: object
properties:
    client_id:
        description: The client id that will be used by Pubsub to make load balancing decisions
        type: string
    compression:
        description: Lock down the compression of the payload, leave empty for attribute based detection
        type: string
    encoding:
        description: Lock down the encoding of the payload, leave empty for attribute based detection
        type: string
    endpoint:
        description: Override of the Pubsub Endpoint, leave empty for the default endpoint
        type: string
    flow_control:
        type: object
        properties:
            max_outstanding_bytes:
                description: Pub/Sub flow control settings for the maximum number of outstanding bytes.
                type: integer
            max_outstanding_messages:
                description: Pub/Sub flow control settings for the maximum number of outstanding messages.
                type: integer
            stream_ack_deadline:
                description: The ack deadline to use for the Pub/Sub stream.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
            trigger_ack_batch_duration:
                description: The maximum duration the acknowledgement loop waits before sending the acknowledgements.
                type: string
                pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
        additionalProperties: false
    ignore_encoding_error:
        description: Ignore errors when the configured encoder fails to decoding a PubSub messages
        type: boolean
    insecure:
        description: Only has effect if Endpoint is not ""
        type: boolean
    project:
        description: Google Cloud Project ID where the Pubsub client will connect to
        type: string
    subscription:
        description: The fully qualified resource name of the Pubsub subscription
        type: string
    timeout:
        description: |-
            Timeout is the timeout for every attempt to send data to the backend.
            A zero timeout means no timeout.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    user_agent:
        description: User agent that will be used by the Pubsub client to connect to the service
        type: string
additionalProperties: false
