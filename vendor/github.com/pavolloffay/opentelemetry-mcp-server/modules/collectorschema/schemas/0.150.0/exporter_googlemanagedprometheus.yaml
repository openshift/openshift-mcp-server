$schema: https://json-schema.org/draft/2020-12/schema
title: googlemanagedprometheus exporter configuration
type: object
properties:
    metric:
        type: object
        properties:
            add_metric_suffixes:
                description: AddMetricSuffixes controls whether suffixes are added to metric names. Defaults to true.
                type: boolean
            compression:
                description: |-
                    Compression specifies the compression format for Metrics and Logging gRPC requests.
                    Supported values: gzip.
                type: string
            cumulative_normalization:
                description: |-
                    CumulativeNormalization normalizes cumulative metrics without start times or with
                    explicit reset points by subtracting subsequent points from the initial point.
                    It is enabled by default. Since it caches starting points, it may result in
                    increased memory usage.
                type: boolean
            endpoint:
                type: string
            extra_metrics_config:
                description: ExtraMetricsConfig configures the target_info and otel_scope_info metrics.
                type: object
                properties:
                    enable_scope_info:
                        description: Add `otel_scope_info` metric and `scope_name`/`scope_version` attributes to all other metrics. On by default.
                        type: boolean
                    enable_target_info:
                        description: Add `target_info` metric based on the resource. On by default.
                        type: boolean
                additionalProperties: false
            grpc_pool_size:
                description: GRPCPoolSize sets the size of the connection pool in the GCP client
                type: integer
            prefix:
                description: |-
                    Prefix configures the prefix of metrics sent to GoogleManagedPrometheus.  Defaults to prometheus.googleapis.com.
                    Changing this prefix is not recommended, as it may cause metrics to not be queryable with promql in the Cloud Monitoring UI.
                type: string
            resource_filters:
                type: array
                items:
                    type: object
                    properties:
                        prefix:
                            type: string
                        regex:
                            description: Match resource keys by regex
                            type: string
                    additionalProperties: false
            universe_domain:
                description: UniverseDomain sets the universe domain.
                type: string
            use_insecure:
                description: Only has effect if Endpoint is not ""
                type: boolean
        additionalProperties: false
    project:
        type: string
    sending_queue:
        type: object
        properties:
            batch:
                description: BatchConfig it configures how the requests are consumed from the queue and batch together during consumption.
                type: object
                properties:
                    flush_timeout:
                        description: FlushTimeout sets the time after which a batch will be sent regardless of its size.
                        type: string
                        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
                    max_size:
                        description: MaxSize defines the configuration for the maximum size of a batch.
                        type: integer
                    min_size:
                        description: MinSize defines the configuration for the minimum size of a batch.
                        type: integer
                    partition:
                        description: Partition defines the partitioning of the batches configuration.
                        type: object
                        properties:
                            metadata_keys:
                                description: |-
                                    MetadataKeys is a list of client.Metadata keys that will be used to partition
                                    the data into batches. If this setting is empty, a single batcher instance
                                    will be used. When this setting is not empty, one batcher will be used per
                                    distinct combination of values for the listed metadata keys.

                                    Empty value and unset metadata are treated as distinct cases.

                                    Entries are case-insensitive. Duplicated entries will trigger a validation error.
                                type: array
                                items:
                                    type: string
                        additionalProperties: false
                    sizer:
                        description: |-
                            Sizer determines the type of size measurement used by the batch.
                            If not configured, use the same configuration as the queue.
                            It accepts "requests", "items", or "bytes".
                        type: object
                additionalProperties: false
            block_on_overflow:
                description: |-
                    BlockOnOverflow determines the behavior when the component's TotalSize limit is reached.
                    If true, the component will wait for space; otherwise, operations will immediately return a retryable error.
                type: boolean
            num_consumers:
                description: |-
                    NumConsumers is the maximum number of concurrent consumers from the queue.
                    This applies across all different optional configurations from above (e.g. wait_for_result, block_on_overflow, storage, etc.).
                type: integer
            queue_size:
                description: QueueSize represents the maximum data size allowed for concurrent storage and processing.
                type: integer
            sizer:
                description: |-
                    Sizer determines the type of size measurement used by this component.
                    It accepts "requests", "items", or "bytes".
                type: object
            storage:
                description: |-
                    StorageID if not empty, enables the persistent storage and uses the component specified
                    as a storage extension for the persistent queue.
                    TODO: This will be changed to Optional when available.
                    See https://github.com/open-telemetry/opentelemetry-collector/issues/13822
                type: string
            wait_for_result:
                description: |-
                    WaitForResult determines if incoming requests are blocked until the request is processed or not.
                    Currently, this option is not available when persistent queue is configured using the storage configuration.
                type: boolean
        additionalProperties: false
    timeout:
        description: |-
            Timeout is the timeout for every attempt to send data to the backend.
            A zero timeout means no timeout.
        type: string
        pattern: ^(0|[-+]?((\d+(\.\d*)?|\.\d+)(ns|us|µs|μs|ms|s|m|h))+)$
    user_agent:
        type: string
additionalProperties: false
