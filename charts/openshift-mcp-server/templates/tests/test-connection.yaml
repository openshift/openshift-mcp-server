apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-connection"
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test-connection
      image: busybox
      command:
        - sh
        - -c
        - |
          wget -qO- http://{{ include "openshift-mcp-server.fullname" . }}:{{ .Values.service.port }}/healthz || exit 1
