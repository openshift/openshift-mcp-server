{{- if .Values.httpRoute.enabled -}}
{{- if empty .Values.httpRoute.parentRefs -}}
{{- fail "httpRoute.parentRefs is required when httpRoute.enabled=true (see charts/kubernetes-mcp-server/README.md#gateway-api-httproute)" -}}
{{- end -}}
{{- $fullName := include "kubernetes-mcp-server.fullname" . -}}
{{- $servicePort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-mcp-server.labels" . | nindent 4 }}
    {{- with .Values.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- tpl (.Values.httpRoute.parentRefs | toYaml) $ | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- tpl (. | toYaml) $ | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.rules }}
    - backendRefs:
        - group: ''
          kind: Service
          name: {{ $fullName }}
          port: {{ $servicePort }}
          weight: 1
      {{- with .matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .timeouts }}
      timeouts:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
